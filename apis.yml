aid: aws-cognito
name: Amazon Cognito
description: >-
  Amazon Cognito is an AWS service that provides authentication, authorization,
  and user management for web and mobile applications. It supports OAuth2, OIDC,
  SAML federation, and social identity providers. Cognito has two main components:
  User Pools for user authentication and app integration, and Federated Identities
  for granting temporary AWS credentials to authenticated users. It includes
  multi-factor authentication, advanced security features, and customizable
  authentication flows.
