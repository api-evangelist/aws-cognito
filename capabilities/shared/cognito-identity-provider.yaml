naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Cognito Identity Provider"
  description: "User authentication and authorization service providing user pools, sign-up, sign-in, MFA, OAuth2, OIDC, and SAML federation for web and mobile applications."
  tags:
    - Amazon Cognito
    - AWS
    - Authentication
    - Authorization
    - Identity
    - OAuth2
    - OIDC
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cognito-idp
      baseUri: https://cognito-idp.{region}.amazonaws.com
      description: "Amazon Cognito Identity Provider control plane API"
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_SIGV4_TOKEN}}"
        placement: header
      resources:
        - name: user-pools
          path: /
          description: "Manage user pools"
          operations:
            - name: list-user-pools
              method: POST
              description: "List all user pools in the account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user-pool
              method: POST
              description: "Create a new user pool"
              body:
                type: json
                data:
                  PoolName: "{{tools.pool_name}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: describe-user-pool
              method: POST
              description: "Get details of a user pool"
              body:
                type: json
                data:
                  UserPoolId: "{{tools.user_pool_id}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /
          description: "Manage users in a user pool"
          operations:
            - name: list-users
              method: POST
              description: "List users in a user pool"
              body:
                type: json
                data:
                  UserPoolId: "{{tools.user_pool_id}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: admin-create-user
              method: POST
              description: "Create a user in a user pool"
              body:
                type: json
                data:
                  UserPoolId: "{{tools.user_pool_id}}"
                  Username: "{{tools.username}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: admin-get-user
              method: POST
              description: "Get a user from a user pool"
              body:
                type: json
                data:
                  UserPoolId: "{{tools.user_pool_id}}"
                  Username: "{{tools.username}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /
          description: "Manage user groups"
          operations:
            - name: list-groups
              method: POST
              description: "List groups in a user pool"
              body:
                type: json
                data:
                  UserPoolId: "{{tools.user_pool_id}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: cognito-idp-rest
      resources:
        - path: /v1/user-pools
          name: user-pools
          description: "User pool management"
          operations:
            - method: GET
              name: list-user-pools
              description: "List all user pools"
              call: "cognito-idp.list-user-pools"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: cognito-idp-mcp
      transport: http
      tools:
        - name: list-user-pools
          description: "List all Cognito user pools"
          hints:
            readOnly: true
            openWorld: true
          call: "cognito-idp.list-user-pools"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user-pool
          description: "Create a new Cognito user pool"
          hints:
            readOnly: false
          call: "cognito-idp.create-user-pool"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-user-pool
          description: "Get details of a Cognito user pool"
          hints:
            readOnly: true
          call: "cognito-idp.describe-user-pool"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List users in a Cognito user pool"
          hints:
            readOnly: true
          call: "cognito-idp.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: admin-create-user
          description: "Create a user in a Cognito user pool"
          hints:
            readOnly: false
          call: "cognito-idp.admin-create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: admin-get-user
          description: "Get a specific user from a Cognito user pool"
          hints:
            readOnly: true
          call: "cognito-idp.admin-get-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List user groups in a Cognito user pool"
          hints:
            readOnly: true
          call: "cognito-idp.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
