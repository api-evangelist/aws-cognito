naftiko: "1.0.0-alpha1"

info:
  label: "Amazon Cognito Identity"
  description: "Federated identity service enabling temporary AWS credentials for authenticated and unauthenticated users from Cognito user pools, social identity providers, and SAML-based IdPs."
  tags:
    - Amazon Cognito
    - AWS
    - Identity
    - Federation
    - Credentials
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cognito-identity
      baseUri: https://cognito-identity.{region}.amazonaws.com
      description: "Amazon Cognito Federated Identities API"
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_SIGV4_TOKEN}}"
        placement: header
      resources:
        - name: identity-pools
          path: /
          description: "Manage federated identity pools"
          operations:
            - name: list-identity-pools
              method: POST
              description: "List all identity pools"
              body:
                type: json
                data:
                  MaxResults: 60
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-identity-pool
              method: POST
              description: "Create a new federated identity pool"
              body:
                type: json
                data:
                  IdentityPoolName: "{{tools.pool_name}}"
                  AllowUnauthenticatedIdentities: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: describe-identity-pool
              method: POST
              description: "Get details of an identity pool"
              body:
                type: json
                data:
                  IdentityPoolId: "{{tools.identity_pool_id}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: cognito-identity-rest
      resources:
        - path: /v1/identity-pools
          name: identity-pools
          description: "Federated identity pool management"
          operations:
            - method: GET
              name: list-identity-pools
              description: "List all identity pools"
              call: "cognito-identity.list-identity-pools"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: cognito-identity-mcp
      transport: http
      tools:
        - name: list-identity-pools
          description: "List all federated identity pools"
          hints:
            readOnly: true
            openWorld: true
          call: "cognito-identity.list-identity-pools"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-identity-pool
          description: "Create a new federated identity pool"
          hints:
            readOnly: false
          call: "cognito-identity.create-identity-pool"
          outputParameters:
            - type: object
              mapping: "$."
        - name: describe-identity-pool
          description: "Get details of a federated identity pool"
          hints:
            readOnly: true
          call: "cognito-identity.describe-identity-pool"
          outputParameters:
            - type: object
              mapping: "$."
