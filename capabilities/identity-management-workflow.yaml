naftiko: 1.0.0-alpha2
info:
  label: Amazon Cognito Identity Management Workflow
  description: Unified workflow for identity and access management engineers to manage Cognito user pools, user accounts,
    groups, and federated identity pools. Combines the Identity Provider and Federated Identity APIs for complete user lifecycle
    and credential management.
  tags:
  - Amazon Cognito
  - AWS
  - Authentication
  - Authorization
  - Identity Management
  - User Management
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: cognito-idp
    baseUri: https://cognito-idp.{region}.amazonaws.com
    description: Amazon Cognito Identity Provider control plane API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_TOKEN}}'
      placement: header
    resources:
    - name: user-pools
      path: /
      description: Manage user pools
      operations:
      - name: list-user-pools
        method: POST
        description: List all user pools in the account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-user-pool
        method: POST
        description: Create a new user pool
        body:
          type: json
          data:
            PoolName: '{{tools.pool_name}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-user-pool
        method: POST
        description: Get details of a user pool
        body:
          type: json
          data:
            UserPoolId: '{{tools.user_pool_id}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /
      description: Manage users in a user pool
      operations:
      - name: list-users
        method: POST
        description: List users in a user pool
        body:
          type: json
          data:
            UserPoolId: '{{tools.user_pool_id}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admin-create-user
        method: POST
        description: Create a user in a user pool
        body:
          type: json
          data:
            UserPoolId: '{{tools.user_pool_id}}'
            Username: '{{tools.username}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admin-get-user
        method: POST
        description: Get a user from a user pool
        body:
          type: json
          data:
            UserPoolId: '{{tools.user_pool_id}}'
            Username: '{{tools.username}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups
      path: /
      description: Manage user groups
      operations:
      - name: list-groups
        method: POST
        description: List groups in a user pool
        body:
          type: json
          data:
            UserPoolId: '{{tools.user_pool_id}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: cognito-identity
    baseUri: https://cognito-identity.{region}.amazonaws.com
    description: Amazon Cognito Federated Identities API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_TOKEN}}'
      placement: header
    resources:
    - name: identity-pools
      path: /
      description: Manage federated identity pools
      operations:
      - name: list-identity-pools
        method: POST
        description: List all identity pools
        body:
          type: json
          data:
            MaxResults: 60
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-identity-pool
        method: POST
        description: Create a new federated identity pool
        body:
          type: json
          data:
            IdentityPoolName: '{{tools.pool_name}}'
            AllowUnauthenticatedIdentities: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-identity-pool
        method: POST
        description: Get details of an identity pool
        body:
          type: json
          data:
            IdentityPoolId: '{{tools.identity_pool_id}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: cognito-workflow-api
    description: Unified REST API for Amazon Cognito identity management.
    resources:
    - path: /v1/user-pools
      name: user-pools
      description: User pool lifecycle management
      operations:
      - method: GET
        name: list-user-pools
        description: List all user pools
        call: cognito-idp.list-user-pools
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-user-pool
        description: Create a new user pool
        call: cognito-idp.create-user-pool
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user-pools/{userPoolId}/users
      name: users
      description: User account management
      operations:
      - method: GET
        name: list-users
        description: List users in a user pool
        call: cognito-idp.list-users
        with:
          user_pool_id: rest.userPoolId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-user
        description: Create a user in a user pool
        call: cognito-idp.admin-create-user
        with:
          user_pool_id: rest.userPoolId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user-pools/{userPoolId}/groups
      name: groups
      description: User group management
      operations:
      - method: GET
        name: list-groups
        description: List user groups
        call: cognito-idp.list-groups
        with:
          user_pool_id: rest.userPoolId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/identity-pools
      name: identity-pools
      description: Federated identity pool management
      operations:
      - method: GET
        name: list-identity-pools
        description: List all federated identity pools
        call: cognito-identity.list-identity-pools
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-identity-pool
        description: Create a federated identity pool
        call: cognito-identity.create-identity-pool
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: cognito-workflow-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Cognito identity management.
    tools:
    - name: list-user-pools
      description: List all Cognito user pools in the account
      hints:
        readOnly: true
        openWorld: true
      call: cognito-idp.list-user-pools
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user-pool
      description: Create a new Cognito user pool for authentication
      hints:
        readOnly: false
      call: cognito-idp.create-user-pool
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-user-pool
      description: Get configuration details of a Cognito user pool
      hints:
        readOnly: true
      call: cognito-idp.describe-user-pool
      outputParameters:
      - type: object
        mapping: $.
    - name: list-users
      description: List users in a Cognito user pool
      hints:
        readOnly: true
      call: cognito-idp.list-users
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create a new user account in a Cognito user pool
      hints:
        readOnly: false
      call: cognito-idp.admin-create-user
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get details of a specific user in a Cognito user pool
      hints:
        readOnly: true
      call: cognito-idp.admin-get-user
      outputParameters:
      - type: object
        mapping: $.
    - name: list-groups
      description: List user groups in a Cognito user pool
      hints:
        readOnly: true
      call: cognito-idp.list-groups
      outputParameters:
      - type: object
        mapping: $.
    - name: list-identity-pools
      description: List all federated identity pools
      hints:
        readOnly: true
        openWorld: true
      call: cognito-identity.list-identity-pools
      outputParameters:
      - type: object
        mapping: $.
    - name: create-identity-pool
      description: Create a federated identity pool for credential vending
      hints:
        readOnly: false
      call: cognito-identity.create-identity-pool
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-identity-pool
      description: Get details of a federated identity pool
      hints:
        readOnly: true
      call: cognito-identity.describe-identity-pool
      outputParameters:
      - type: object
        mapping: $.
