paths:
  /#X-Amz-Target=AWSCognitoIdentityService.UpdateIdentityPool:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: UpdateIdentityPool
      description: <p>Updates an identity pool.</p> <p>You must use AWS Developer credentials to call this API.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityPool'
              examples:
                UpdateIdentityPool200Example:
                  summary: Default UpdateIdentityPool 200 response
                  x-microcks-default: true
                  value:
                    IdentityPoolId: us-east-1_AbCdEfGhI
                    IdentityPoolName: my-user-pool
                    AllowUnauthenticatedIdentities: us-east-1_AbCdEfGhI
                    AllowClassicFlow: example-value
                    SupportedLoginProviders: us-east-1_AbCdEfGhI
                    DeveloperProviderName: my-user-pool
                    OpenIdConnectProviderARNs: arn:aws:cognito-idp:us-east-1:123456789:userpool/us-east-1_AbCdEfGhI
                    CognitoIdentityProviders: us-east-1_AbCdEfGhI
                    SamlProviderARNs: arn:aws:cognito-idp:us-east-1:123456789:userpool/us-east-1_AbCdEfGhI
                    IdentityPoolTags: us-east-1_AbCdEfGhI
        '480':
          description: InvalidParameterException
