      - INACTIVE
    PasswordPolicyType:
      type: object
      properties:
        MinimumLength:
          allOf:
          - $ref: '#/components/schemas/PasswordPolicyMinLengthType'
          - description: The minimum length of the password in the policy that you have set. This value can't be less than 6.
        RequireUppercase:
          allOf:
