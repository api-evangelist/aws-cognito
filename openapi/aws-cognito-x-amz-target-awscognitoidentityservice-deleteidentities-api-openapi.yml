security:
- hmac: []
tags:
- name: '#X Amz Target=AWSCognitoIdentityService.DeleteIdentities'
paths:
  /#X-Amz-Target=AWSCognitoIdentityService.DeleteIdentities:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: DeleteIdentities
      description: <p>Deletes identities from an identity pool. You can specify a list of 1-60 identities that you want to delete.</p> <p>You must use AWS Developer credentials to call this API.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteIdentitiesResponse'
              examples:
                DeleteIdentities200Example:
                  summary: Default DeleteIdentities 200 response
                  x-microcks-default: true
                  value:
                    UnprocessedIdentityIds: us-east-1_AbCdEfGhI
        '480':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
              examples:
                DeleteIdentities480Example:
                  summary: Default DeleteIdentities 480 response
                  x-microcks-default: true
                  value: example
        '481':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                DeleteIdentities481Example:
                  summary: Default DeleteIdentities 481 response
                  x-microcks-default: true
                  value: example
        '482':
          description: InternalErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorException'
              examples:
                DeleteIdentities482Example:
                  summary: Default DeleteIdentities 482 response
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteIdentitiesInput'
            examples:
              DeleteIdentitiesRequestExample:
                summary: Default DeleteIdentities request
                x-microcks-default: true
                value:
                  IdentityIdsToDelete: us-east-1_AbCdEfGhI
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AWSCognitoIdentityService.DeleteIdentities
      summary: Amazon Cognito Delete Identities
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=AWSCognitoIdentityService.DeleteIdentities'
components:
  schemas:
    InvalidParameterException: {}
    UnprocessedIdentityId:
      type: object
      properties:
        IdentityId:
          allOf:
          - $ref: '#/components/schemas/IdentityId'
          - description: A unique identifier in the format REGION:GUID.
        ErrorCode:
          allOf:
          - $ref: '#/components/schemas/ErrorCode'
          - description: The error code indicating the type of error that occurred.
      description: An array of UnprocessedIdentityId objects, each of which contains an ErrorCode and IdentityId.
    DeleteIdentitiesInput:
      type: object
      required:
      - IdentityIdsToDelete
      title: DeleteIdentitiesInput
      properties:
        IdentityIdsToDelete:
          allOf:
          - $ref: '#/components/schemas/IdentityIdList'
          - description: A list of 1-60 identities that you want to delete.
      description: Input to the <code>DeleteIdentities</code> action.
    InternalErrorException: {}
    TooManyRequestsException: {}
    UnprocessedIdentityIdList:
      type: array
      items:
        $ref: '#/components/schemas/UnprocessedIdentityId'
      maxItems: 60
    IdentityId:
      type: string
      pattern: '[\w-]+:[0-9a-f-]+'
      minLength: 1
      maxLength: 55
    DeleteIdentitiesResponse:
      type: object
      properties:
        UnprocessedIdentityIds:
          allOf:
          - $ref: '#/components/schemas/UnprocessedIdentityIdList'
          - description: An array of UnprocessedIdentityId objects, each of which contains an ErrorCode and IdentityId.
      description: Returned in response to a successful <code>DeleteIdentities</code> operation.
    IdentityIdList:
      type: array
      items:
        $ref: '#/components/schemas/IdentityId'
      minItems: 1
      maxItems: 60
    ErrorCode:
      type: string
      enum:
      - AccessDenied
      - InternalServerError
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
