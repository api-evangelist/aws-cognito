components:
  schemas:
    ResourceNotFoundException: {}
    UserNotFoundException: {}
    InvalidPasswordException: {}
    UserNotConfirmedException: {}
    InvalidParameterException: {}
    TooManyRequestsException: {}
    InternalErrorException: {}
    LimitExceededException: {}
    NotAuthorizedException: {}
    PasswordResetRequiredException: {}
    PasswordType:
      type: string
      pattern: '[\S]+'
      maxLength: 256
      format: password
    ChangePasswordRequest:
      type: object
      required:
      - PreviousPassword
      - ProposedPassword
      - AccessToken
      title: ChangePasswordRequest
      properties:
        PreviousPassword:
          allOf:
          - $ref: '#/components/schemas/PasswordType'
          - description: The old password.
        ProposedPassword:
          allOf:
          - $ref: '#/components/schemas/PasswordType'
          - description: The new password.
        AccessToken:
          allOf:
          - $ref: '#/components/schemas/TokenModelType'
          - description: A valid access token that Amazon Cognito issued to the user whose password you want to change.
      description: Represents the request to change a user password.
    ChangePasswordResponse:
      type: object
      properties: {}
      description: The response from the server to the change password request.
    TokenModelType:
      type: string
      pattern: '[A-Za-z0-9-_=.]+'
      format: password
    ForbiddenException: {}
