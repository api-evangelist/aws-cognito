      properties:
        ClientId:
          allOf:
          - $ref: "#/components/schemas/ClientIdType"
          - description: The app client ID.
        ChallengeName:
          allOf:
          - $ref: "#/components/schemas/ChallengeNameType"
          - description: <p>The challenge name. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_InitiateAuth.html">InitiateAuth</a>.</p> <p> <code>ADMIN_NO_SRP_AUTH</code> isn't a valid value.</p>
        Session:
          allOf:
          - $ref: "#/components/schemas/SessionType"
          - description: The session that should be passed both ways in challenge-response calls to the service. If <code>InitiateAuth</code> or <code>RespondToAuthChallenge</code> API call determines
