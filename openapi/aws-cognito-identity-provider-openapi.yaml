        EncodedData:
          allOf:
          - $ref: "#/components/schemas/StringType"
          - description: Encoded device-fingerprint details that your app collected with the Amazon Cognito context data collection library. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pool-settings-adaptive-authentication.html#user-pool-settings-adaptive-authentication-device-fingerprint">Adding
              user device and session data to API requests</a>.
      description: Contextual data, such as the user's device fingerprint, IP address, or location, used for evaluating the risk of an unexpected event by Amazon Cognito advanced security.
    HttpHeaderList:
      type: array
      items:
        $ref: "#/components/schemas/HttpHeader"
    DescriptionType:
      type: string
      maxLength: 2048
    PrecedenceType:
      type: integer
      minimum: 0
    GroupType:
      type: object
      properties:
        GroupName:
          allOf:
          - $ref: "#/components/schemas/GroupNameType"
          - description: The name of the group.
        UserPoolId:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The user pool ID for the user pool.
        Description:
          allOf:
          - $ref: "#/components/schemas/DescriptionType"
          - description: A string containing the description of the group.
        RoleArn:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: The role Amazon Resource Name (ARN) for the group.
        Precedence:
          allOf:
          - $ref: "#/components/schemas/PrecedenceType"
          - description: <p>A non-negative integer value that specifies the precedence of this group relative to the other groups that a user can belong to in the user pool. Zero is the highest 
              precedence value. Groups with lower <code>Precedence</code> values take precedence over groups with higher ornull <code>Precedence</code> values. If a user belongs to two or more groups,
              it is the group with the lowest precedence value whose role ARN is given in the user's tokens for the <code>cognito:roles</code> and <code>cognito:preferred_role</code> claims.</p> 
              <p>Two groups can have the same <code>Precedence</code> value. If this happens, neither group takes precedence over the other. If two groups with the same <code>Precedence</code> have 
              the same role ARN, that role is used in the <code>cognito:preferred_role</code> claim in tokens for users in each group. If the two groups have different role ARNs, the 
              <code>cognito:preferred_role</code> claim isn't set in users' tokens.</p> <p>The default <code>Precedence</code> value is null.</p>
        LastModifiedDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the group was last modified.
        CreationDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the group was created.
      description: The group type.
    ProviderNameTypeV1:
      type: string
      pattern: "[^_][\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}][^_]+"
      minLength: 3
      maxLength: 32
    IdentityProviderTypeType:
      type: string
      enum:
      - SAML
      - Facebook
      - Google
      - LoginWithAmazon
      - SignInWithApple
      - OIDC
    ProviderDetailsType:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/StringType"
    IdpIdentifiersListType:
      type: array
      items:
        $ref: "#/components/schemas/IdpIdentifierType"
      minItems: 0
      maxItems: 50
    IdentityProviderType:
      type: object
      properties:
        UserPoolId:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The user pool ID.
        ProviderName:
          allOf:
          - $ref: "#/components/schemas/ProviderNameType"
          - description: The IdP name.
        ProviderType:
          allOf:
          - $ref: "#/components/schemas/IdentityProviderTypeType"
          - description: The IdP type.
        ProviderDetails:
          allOf:
          - $ref: "#/components/schemas/ProviderDetailsType"
          - description: <p>The IdP details. The following list describes the provider detail keys for each IdP type.</p> <ul> <li> <p>For Google and Login with Amazon:</p> <ul> <li> <p>client_id</p> 
              </li> <li> <p>client_secret</p> </li> <li> <p>authorize_scopes</p> </li> </ul> </li> <li> <p>For Facebook:</p> <ul> <li> <p>client_id</p> </li> <li> <p>client_secret</p> </li> <li> 
              <p>authorize_scopes</p> </li> <li> <p>api_version</p> </li> </ul> </li> <li> <p>For Sign in with Apple:</p> <ul> <li> <p>client_id</p> </li> <li> <p>team_id</p> </li> <li> <p>key_id</p> 
              </li> <li> <p>private_key</p> <p> <i>You can submit a private_key when you add or update an IdP. Describe operations don't return the private key.</i> </p> </li> <li> 
              <p>authorize_scopes</p> </li> </ul> </li> <li> <p>For OIDC providers:</p> <ul> <li> <p>client_id</p> </li> <li> <p>client_secret</p> </li> <li> <p>attributes_request_method</p> </li> 
              <li> <p>oidc_issuer</p> </li> <li> <p>authorize_scopes</p> </li> <li> <p>The following keys are only present if Amazon Cognito didn't discover them at the <code>oidc_issuer</code> 
              URL.</p> <ul> <li> <p>authorize_url </p> </li> <li> <p>token_url </p> </li> <li> <p>attributes_url </p> </li> <li> <p>jwks_uri </p> </li> </ul> </li> <li> <p>Amazon Cognito sets the 
              value of the following keys automatically. They are read-only.</p> <ul> <li> <p>attributes_url_add_attributes </p> </li> </ul> </li> </ul> </li> <li> <p>For SAML providers:</p> <ul> <li>
              <p>MetadataFile or MetadataURL</p> </li> <li> <p>IDPSignout <i>optional</i> </p> </li> </ul> </li> </ul>
        AttributeMapping:
          allOf:
          - $ref: "#/components/schemas/AttributeMappingType"
          - description: A mapping of IdP attributes to standard and custom user pool attributes.
        IdpIdentifiers:
          allOf:
          - $ref: "#/components/schemas/IdpIdentifiersListType"
          - description: A list of IdP identifiers.
        LastModifiedDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the IdP was last modified.
        CreationDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the IdP was created.
      description: A container for information about an IdP.
    ResourceServerIdentifierType:
      type: string
      pattern: "[\\x21\\x23-\\x5B\\x5D-\\x7E]+"
      minLength: 1
      maxLength: 256
    ResourceServerNameType:
      type: string
      pattern: "[\\w\\s+=,.@-]+"
      minLength: 1
      maxLength: 256
    ResourceServerScopeListType:
      type: array
      items:
        $ref: "#/components/schemas/ResourceServerScopeType"
      maxItems: 100
    ResourceServerType:
      type: object
      properties:
        UserPoolId:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The user pool ID for the user pool that hosts the resource server.
        Identifier:
          allOf:
          - $ref: "#/components/schemas/ResourceServerIdentifierType"
          - description: The identifier for the resource server.
        Name:
          allOf:
          - $ref: "#/components/schemas/ResourceServerNameType"
          - description: The name of the resource server.
        Scopes:
          allOf:
          - $ref: "#/components/schemas/ResourceServerScopeListType"
          - description: A list of scopes that are defined for the resource server.
      description: A container for information about a resource server for a user pool.
    UserImportJobNameType:
      type: string
      pattern: "[\\w\\s+=,.@-]+"
      minLength: 1
      maxLength: 128
    UserImportJobType:
      type: object
      properties:
        JobName:
          allOf:
          - $ref: "#/components/schemas/UserImportJobNameType"
          - description: The job name for the user import job.
        JobId:
          allOf:
          - $ref: "#/components/schemas/UserImportJobIdType"
          - description: The job ID for the user import job.
        UserPoolId:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The user pool ID for the user pool that the users are being imported into.
        PreSignedUrl:
          allOf:
          - $ref: "#/components/schemas/PreSignedUrlType"
          - description: The pre-signed URL to be used to upload the <code>.csv</code> file.
        CreationDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the user import job was created.
        StartDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date when the user import job was started.
        CompletionDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date when the user import job was completed.
        Status:
          allOf:
          - $ref: "#/components/schemas/UserImportJobStatusType"
          - description: <p>The status of the user import job. One of the following:</p> <ul> <li> <p> <code>Created</code> - The job was created but not started.</p> </li> <li> <p> 
              <code>Pending</code> - A transition state. You have started the job, but it has not begun importing users yet.</p> </li> <li> <p> <code>InProgress</code> - The job has started, and users
              are being imported.</p> </li> <li> <p> <code>Stopping</code> - You have stopped the job, but the job has not stopped importing users yet.</p> </li> <li> <p> <code>Stopped</code> - You 
              have stopped the job, and the job has stopped importing users.</p> </li> <li> <p> <code>Succeeded</code> - The job has completed successfully.</p> </li> <li> <p> <code>Failed</code> - 
              The job has stopped due to an error.</p> </li> <li> <p> <code>Expired</code> - You created a job, but did not start the job within 24-48 hours. All data associated with the job was 
              deleted, and the job can't be started.</p> </li> </ul>
        CloudWatchLogsRoleArn:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: The role Amazon Resource Name (ARN) for the Amazon CloudWatch Logging role for the user import job. For more information, see "Creating the CloudWatch Logs IAM Role" in the 
              Amazon Cognito Developer Guide.
        ImportedUsers:
          allOf:
          - $ref: "#/components/schemas/LongType"
          - description: The number of users that were successfully imported.
        SkippedUsers:
          allOf:
          - $ref: "#/components/schemas/LongType"
          - description: The number of users that were skipped.
        FailedUsers:
          allOf:
          - $ref: "#/components/schemas/LongType"
          - description: The number of users that couldn't be imported.
        CompletionMessage:
          allOf:
          - $ref: "#/components/schemas/CompletionMessageType"
          - description: The message returned when the user import job is completed.
      description: The user import job type.
    GenerateSecret:
      type: boolean
    RefreshTokenValidityType:
      type: integer
      minimum: 0
      maximum: 315360000
    IdTokenValidityType:
      type: integer
      minimum: 1
      maximum: 86400
    TokenValidityUnitsType:
      type: object
      properties:
        AccessToken:
          allOf:
          - $ref: "#/components/schemas/TimeUnitsType"
          - description: " A time unit of <code>seconds</code>, <code>minutes</code>, <code>hours</code>, or <code>days</code> for the value that you set in the <code>AccessTokenValidity</code> parameter.
              The default <code>AccessTokenValidity</code> time unit is hours."
        IdToken:
          allOf:
          - $ref: "#/components/schemas/TimeUnitsType"
          - description: A time unit of <code>seconds</code>, <code>minutes</code>, <code>hours</code>, or <code>days</code> for the value that you set in the <code>IdTokenValidity</code> parameter. 
              The default <code>IdTokenValidity</code> time unit is hours.
        RefreshToken:
          allOf:
          - $ref: "#/components/schemas/TimeUnitsType"
          - description: A time unit of <code>seconds</code>, <code>minutes</code>, <code>hours</code>, or <code>days</code> for the value that you set in the <code>RefreshTokenValidity</code> 
              parameter. The default <code>RefreshTokenValidity</code> time unit is days.
      description: The data type TokenValidityUnits specifies the time units you use when you set the duration of ID, access, and refresh tokens.
    ExplicitAuthFlowsListType:
      type: array
      items:
        $ref: "#/components/schemas/ExplicitAuthFlowsType"
    SupportedIdentityProvidersListType:
      type: array
      items:
        $ref: "#/components/schemas/ProviderNameType"
    LogoutURLsListType:
      type: array
      items:
        $ref: "#/components/schemas/RedirectUrlType"
      minItems: 0
      maxItems: 100
    OAuthFlowsType:
      type: array
      items:
        $ref: "#/components/schemas/OAuthFlowType"
      minItems: 0
      maxItems: 3
    ScopeListType:
      type: array
      items:
        $ref: "#/components/schemas/ScopeType"
      maxItems: 50
    PreventUserExistenceErrorTypes:
      type: string
      enum:
      - LEGACY
      - ENABLED
    WrappedBooleanType:
      type: boolean
    UserPoolClientType:
      type: object
      properties:
        UserPoolId:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The user pool ID for the user pool client.
        ClientName:
          allOf:
          - $ref: "#/components/schemas/ClientNameType"
          - description: The client name from the user pool request of the client type.
        ClientId:
          allOf:
          - $ref: "#/components/schemas/ClientIdType"
          - description: The ID of the client associated with the user pool.
        ClientSecret:
          allOf:
          - $ref: "#/components/schemas/ClientSecretType"
          - description: The client secret from the user pool request of the client type.
        LastModifiedDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the user pool client was last modified.
        CreationDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the user pool client was created.
        RefreshTokenValidity:
          allOf:
          - $ref: "#/components/schemas/RefreshTokenValidityType"
          - description: <p>The refresh token time limit. After this limit expires, your user can't use their refresh token. To specify the time unit for <code>RefreshTokenValidity</code> as 
              <code>seconds</code>, <code>minutes</code>, <code>hours</code>, or <code>days</code>, set a <code>TokenValidityUnits</code> value in your API request.</p> <p>For example, when you set 
              <code>RefreshTokenValidity</code> as <code>10</code> and <code>TokenValidityUnits</code> as <code>days</code>, your user can refresh their session and retrieve new access and ID tokens 
              for 10 days.</p> <p>The default time unit for <code>RefreshTokenValidity</code> in an API request is days. You can't set <code>RefreshTokenValidity</code> to 0. If you do, Amazon Cognito
              overrides the value with the default value of 30 days. <i>Valid range</i> is displayed below in seconds.</p> <p>If you don't specify otherwise in the configuration of your app client, 
              your refresh tokens are valid for 30 days.</p>
        AccessTokenValidity:
          allOf:
          - $ref: "#/components/schemas/AccessTokenValidityType"
          - description: <p>The access token time limit. After this limit expires, your user can't use their access token. To specify the time unit for <code>AccessTokenValidity</code> as 
              <code>seconds</code>, <code>minutes</code>, <code>hours</code>, or <code>days</code>, set a <code>TokenValidityUnits</code> value in your API request.</p> <p>For example, when you set 
              <code>AccessTokenValidity</code> to <code>10</code> and <code>TokenValidityUnits</code> to <code>hours</code>, your user can authorize access with their access token for 10 hours.</p> 
              <p>The default time unit for <code>AccessTokenValidity</code> in an API request is hours. <i>Valid range</i> is displayed below in seconds.</p> <p>If you don't specify otherwise in the 
              configuration of your app client, your access tokens are valid for one hour.</p>
        IdTokenValidity:
          allOf:
          - $ref: "#/components/schemas/IdTokenValidityType"
          - description: <p>The ID token time limit. After this limit expires, your user can't use their ID token. To specify the time unit for <code>IdTokenValidity</code> as <code>seconds</code>, 
              <code>minutes</code>, <code>hours</code>, or <code>days</code>, set a <code>TokenValidityUnits</code> value in your API request.</p> <p>For example, when you set 
              <code>IdTokenValidity</code> as <code>10</code> and <code>TokenValidityUnits</code> as <code>hours</code>, your user can authenticate their session with their ID token for 10 hours.</p> 
              <p>The default time unit for <code>AccessTokenValidity</code> in an API request is hours. <i>Valid range</i> is displayed below in seconds.</p> <p>If you don't specify otherwise in the 
              configuration of your app client, your ID tokens are valid for one hour.</p>
        TokenValidityUnits:
          allOf:
          - $ref: "#/components/schemas/TokenValidityUnitsType"
          - description: "The time units used to specify the token validity times of each token type: ID, access, and refresh."
        ReadAttributes:
          allOf:
          - $ref: "#/components/schemas/ClientPermissionListType"
          - description: The Read-only attributes.
        WriteAttributes:
          allOf:
          - $ref: "#/components/schemas/ClientPermissionListType"
          - description: The writeable attributes.
        ExplicitAuthFlows:
          allOf:
          - $ref: "#/components/schemas/ExplicitAuthFlowsListType"
          - description: "<p>The authentication flows that you want your user pool client to support. For each app client in your user pool, you can sign in your users with any combination of one or more
              flows, including with a user name and Secure Remote Password (SRP), a user name and password, or a custom authentication process that you define with Lambda functions.</p> <note> <p>If you
              don't specify a value for <code>ExplicitAuthFlows</code>, your user client supports <code>ALLOW_REFRESH_TOKEN_AUTH</code>, <code>ALLOW_USER_SRP_AUTH</code>, and <code>ALLOW_CUSTOM_AUTH</code>.</p>
              </note> <p>Valid values include:</p> <ul> <li> <p> <code>ALLOW_ADMIN_USER_PASSWORD_AUTH</code>: Enable admin based user password authentication flow <code>ADMIN_USER_PASSWORD_AUTH</code>.
              This setting replaces the <code>ADMIN_NO_SRP_AUTH</code> setting. With this authentication flow, your app passes a user name and password to Amazon Cognito in the request, instead of using
              the Secure Remote Password (SRP) protocol to securely transmit the password.</p> </li> <li> <p> <code>ALLOW_CUSTOM_AUTH</code>: Enable Lambda trigger based authentication.</p> </li> <li> <p>
              <code>ALLOW_USER_PASSWORD_AUTH</code>: Enable user password-based authentication. In this flow, Amazon Cognito receives the password in the request instead of using the SRP protocol to verify
              passwords.</p> </li> <li> <p> <code>ALLOW_USER_SRP_AUTH</code>: Enable SRP-based authentication.</p> </li> <li> <p> <code>ALLOW_REFRESH_TOKEN_AUTH</code>: Enable authflow to refresh tokens.</p>
              </li> </ul> <p>In some environments, you will see the values <code>ADMIN_NO_SRP_AUTH</code>, <code>CUSTOM_AUTH_FLOW_ONLY</code>, or <code>USER_PASSWORD_AUTH</code>. You can't assign these
              legacy <code>ExplicitAuthFlows</code> values to user pool clients at the same time as values that begin with <code>ALLOW_</code>, like <code>ALLOW_USER_SRP_AUTH</code>.</p>"
        SupportedIdentityProviders:
          allOf:
          - $ref: "#/components/schemas/SupportedIdentityProvidersListType"
          - description: "A list of provider names for the IdPs that this client supports. The following are supported: <code>COGNITO</code>, <code>Facebook</code>, <code>Google</code>, <code>SignInWithApple</code>,
              <code>LoginWithAmazon</code>, and the names of your own SAML and OIDC providers."
        CallbackURLs:
          allOf:
          - $ref: "#/components/schemas/CallbackURLsListType"
          - description: <p>A list of allowed redirect (callback) URLs for the IdPs.</p> <p>A redirect URI must:</p> <ul> <li> <p>Be an absolute URI.</p> </li> <li> <p>Be registered with the 
              authorization server.</p> </li> <li> <p>Not include a fragment component.</p> </li> </ul> <p>See <a href="https://tools.ietf.org/html/rfc6749#section-3.1.2">OAuth 2.0 - Redirection 
              Endpoint</a>.</p> <p>Amazon Cognito requires HTTPS over HTTP except for http://localhost for testing purposes only.</p> <p>App callback URLs such as myapp://example are also 
              supported.</p>
        LogoutURLs:
          allOf:
          - $ref: "#/components/schemas/LogoutURLsListType"
          - description: A list of allowed logout URLs for the IdPs.
        DefaultRedirectURI:
          allOf:
          - $ref: "#/components/schemas/RedirectUrlType"
          - description: <p>The default redirect URI. Must be in the <code>CallbackURLs</code> list.</p> <p>A redirect URI must:</p> <ul> <li> <p>Be an absolute URI.</p> </li> <li> <p>Be registered 
              with the authorization server.</p> </li> <li> <p>Not include a fragment component.</p> </li> </ul> <p>See <a href="https://tools.ietf.org/html/rfc6749#section-3.1.2">OAuth 2.0 - 
              Redirection Endpoint</a>.</p> <p>Amazon Cognito requires HTTPS over HTTP except for http://localhost for testing purposes only.</p> <p>App callback URLs such as myapp://example are also 
              supported.</p>
        AllowedOAuthFlows:
          allOf:
          - $ref: "#/components/schemas/OAuthFlowsType"
          - description: <p>The allowed OAuth flows.</p> <dl> <dt>code</dt> <dd> <p>Use a code grant flow, which provides an authorization code as the response. This code can be exchanged for access 
              tokens with the <code>/oauth2/token</code> endpoint.</p> </dd> <dt>implicit</dt> <dd> <p>Issue the access token (and, optionally, ID token, based on scopes) directly to your user.</p> 
              </dd> <dt>client_credentials</dt> <dd> <p>Issue the access token from the <code>/oauth2/token</code> endpoint directly to a non-person user using a combination of the client ID and 
              client secret.</p> </dd> </dl>
        AllowedOAuthScopes:
          allOf:
          - $ref: "#/components/schemas/ScopeListType"
          - description: The OAuth scopes that your app client supports. Possible values that OAuth provides are <code>phone</code>, <code>email</code>, <code>openid</code>, and <code>profile</code>. 
              Possible values that Amazon Web Services provides are <code>aws.cognito.signin.user.admin</code>. Amazon Cognito also supports custom scopes that you create in Resource Servers.
        AllowedOAuthFlowsUserPoolClient:
          allOf:
          - $ref: "#/components/schemas/BooleanType"
          - description: Set to true if the client is allowed to follow the OAuth protocol when interacting with Amazon Cognito user pools.
        AnalyticsConfiguration:
          allOf:
          - $ref: "#/components/schemas/AnalyticsConfigurationType"
          - description: <p>The Amazon Pinpoint analytics configuration for the user pool client.</p> <note> <p>Amazon Cognito user pools only support sending events to Amazon Pinpoint projects in the
              US East (N. Virginia) us-east-1 Region, regardless of the Region where the user pool resides.</p> </note>
        PreventUserExistenceErrors:
          allOf:
          - $ref: "#/components/schemas/PreventUserExistenceErrorTypes"
          - description: <p>Errors and responses that you want Amazon Cognito APIs to return during authentication, account confirmation, and password recovery when the user doesn't exist in the user 
              pool. When set to <code>ENABLED</code> and the user doesn't exist, authentication returns an error indicating either the username or password was incorrect. Account confirmation and 
              password recovery return a response indicating a code was sent to a simulated destination. When set to <code>LEGACY</code>, those APIs return a <code>UserNotFoundException</code> 
              exception if the user doesn't exist in the user pool.</p> <p>Valid values include:</p> <ul> <li> <p> <code>ENABLED</code> - This prevents user existence-related errors.</p> </li> <li> 
              <p> <code>LEGACY</code> - This represents the old behavior of Amazon Cognito where user existence related errors aren't prevented.</p> </li> </ul>
        EnableTokenRevocation:
          allOf:
          - $ref: "#/components/schemas/WrappedBooleanType"
          - description: Indicates whether token revocation is activated for the user pool client. When you create a new user pool client, token revocation is activated by default. For more 
              information about revoking tokens, see <a href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_RevokeToken.html">RevokeToken</a>.
        EnablePropagateAdditionalUserContextData:
          allOf:
          - $ref: "#/components/schemas/WrappedBooleanType"
          - description: <p>When <code>EnablePropagateAdditionalUserContextData</code> is true, Amazon Cognito accepts an <code>IpAddress</code> value that you send in the <code>UserContextData</code>
              parameter. The <code>UserContextData</code> parameter sends information to Amazon Cognito advanced security for risk analysis. You can send <code>UserContextData</code> when you sign in 
              Amazon Cognito native users with the <code>InitiateAuth</code> and <code>RespondToAuthChallenge</code> API operations.</p> <p>When <code>EnablePropagateAdditionalUserContextData</code> 
              is false, you can't send your user's source IP address to Amazon Cognito advanced security with unauthenticated API operations. <code>EnablePropagateAdditionalUserContextData</code> 
              doesn't affect whether you can send a source IP address in a <code>ContextData</code> parameter with the authenticated API operations <code>AdminInitiateAuth</code> and 
              <code>AdminRespondToAuthChallenge</code>.</p> <p>You can only activate <code>EnablePropagateAdditionalUserContextData</code> in an app client that has a client secret. For more 
              information about propagation of user context data, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pool-settings-adaptive-authentication.html#user-pool-settings-adaptive-authentication-device-fingerprint">Adding
              user device and session data to API requests</a>.</p>
        AuthSessionValidity:
          allOf:
          - $ref: "#/components/schemas/AuthSessionValidityType"
          - description: Amazon Cognito creates a session token for each API request in an authentication flow. <code>AuthSessionValidity</code> is the duration, in minutes, of that session token. 
              Your user pool native user must respond to each authentication challenge before the session expires.
      description: Contains information about a user pool client.
    DomainType:
      type: string
      pattern: ^[a-z0-9](?:[a-z0-9\-]{0,61}[a-z0-9])?$
      minLength: 1
      maxLength: 63
    CustomDomainConfigType:
      type: object
      required:
      - CertificateArn
      properties:
        CertificateArn:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: The Amazon Resource Name (ARN) of an Certificate Manager SSL certificate. You use this certificate for the subdomain of your custom domain.
      description: The configuration for a custom domain that hosts the sign-up and sign-in webpages for your application.
    UserPoolNameType:
      type: string
      pattern: "[\\w\\s+=,.@-]+"
      minLength: 1
      maxLength: 128
    UserPoolPolicyType:
      type: object
      properties:
        PasswordPolicy:
          allOf:
          - $ref: "#/components/schemas/PasswordPolicyType"
          - description: The password policy.
      description: The policy associated with a user pool.
    DeletionProtectionType:
      type: string
      enum:
      - ACTIVE
      - INACTIVE
    LambdaConfigType:
      type: object
      properties:
        PreSignUp:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: A pre-registration Lambda trigger.
        CustomMessage:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: A custom Message Lambda trigger.
        PostConfirmation:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: A post-confirmation Lambda trigger.
        PreAuthentication:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: A pre-authentication Lambda trigger.
        PostAuthentication:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: A post-authentication Lambda trigger.
        DefineAuthChallenge:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: Defines the authentication challenge.
        CreateAuthChallenge:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: Creates an authentication challenge.
        VerifyAuthChallengeResponse:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: Verifies the authentication challenge response.
        PreTokenGeneration:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: A Lambda trigger that is invoked before token generation.
        UserMigration:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: The user migration Lambda config type.
        CustomSMSSender:
          allOf:
          - $ref: "#/components/schemas/CustomSMSLambdaVersionConfigType"
          - description: A custom SMS sender Lambda trigger.
        CustomEmailSender:
          allOf:
          - $ref: "#/components/schemas/CustomEmailLambdaVersionConfigType"
          - description: A custom email sender Lambda trigger.
        KMSKeyID:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: The Amazon Resource Name (ARN) of an <a href="/kms/latest/developerguide/concepts.html#master_keys">KMS key</a>. Amazon Cognito uses the key to encrypt codes and temporary 
              passwords sent to <code>CustomEmailSender</code> and <code>CustomSMSSender</code>.
      description: Specifies the configuration for Lambda triggers.
    VerifiedAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/VerifiedAttributeType"
    UsernameAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/UsernameAttributeType"
    SmsVerificationMessageType:
      type: string
      pattern: .*\{####\}.*
      minLength: 6
      maxLength: 140
    EmailVerificationMessageType:
      type: string
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*\\{####\\}[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s*]*"
      minLength: 6
      maxLength: 20000
    EmailVerificationSubjectType:
      type: string
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}\\s]+"
      minLength: 1
      maxLength: 140
    VerificationMessageTemplateType:
      type: object
      properties:
        SmsMessage:
          allOf:
          - $ref: "#/components/schemas/SmsVerificationMessageType"
          - description: The template for SMS messages that Amazon Cognito sends to your users.
        EmailMessage:
          allOf:
          - $ref: "#/components/schemas/EmailVerificationMessageType"
          - description: The template for email messages that Amazon Cognito sends to your users. You can set an <code>EmailMessage</code> template only if the value of <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount"> 
              EmailSendingAccount</a> is <code>DEVELOPER</code>. When your <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount">EmailSendingAccount</a>
              is <code>DEVELOPER</code>, your user pool sends email messages with your own Amazon SES configuration.
        EmailSubject:
          allOf:
          - $ref: "#/components/schemas/EmailVerificationSubjectType"
          - description: The subject line for the email message template. You can set an <code>EmailSubject</code> template only if the value of <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount"> 
              EmailSendingAccount</a> is <code>DEVELOPER</code>. When your <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount">EmailSendingAccount</a>
              is <code>DEVELOPER</code>, your user pool sends email messages with your own Amazon SES configuration.
        EmailMessageByLink:
          allOf:
          - $ref: "#/components/schemas/EmailVerificationMessageByLinkType"
          - description: The email message template for sending a confirmation link to the user. You can set an <code>EmailMessageByLink</code> template only if the value of <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount"> 
              EmailSendingAccount</a> is <code>DEVELOPER</code>. When your <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount">EmailSendingAccount</a>
              is <code>DEVELOPER</code>, your user pool sends email messages with your own Amazon SES configuration.
        EmailSubjectByLink:
          allOf:
          - $ref: "#/components/schemas/EmailVerificationSubjectByLinkType"
          - description: The subject line for the email message template for sending a confirmation link to the user. You can set an <code>EmailSubjectByLink</code> template only if the value of <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount"> 
              EmailSendingAccount</a> is <code>DEVELOPER</code>. When your <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_EmailConfigurationType.html#CognitoUserPools-Type-EmailConfigurationType-EmailSendingAccount">EmailSendingAccount</a>
              is <code>DEVELOPER</code>, your user pool sends email messages with your own Amazon SES configuration.
        DefaultEmailOption:
          allOf:
          - $ref: "#/components/schemas/DefaultEmailOptionType"
          - description: The default email option.
      description: The template for verification messages.
    UserPoolMfaType:
      type: string
      enum:
      - OFF
      - ON
      - OPTIONAL
    UserAttributeUpdateSettingsType:
      type: object
      properties:
        AttributesRequireVerificationBeforeUpdate:
          allOf:
          - $ref: "#/components/schemas/AttributesRequireVerificationBeforeUpdateType"
          - description: <p>Requires that your user verifies their email address, phone number, or both before Amazon Cognito updates the value of that attribute. When you update a user attribute that
              has this option activated, Amazon Cognito sends a verification message to the new phone number or email address. Amazon Cognito doesn’t change the value of the attribute until your user 
              responds to the verification message and confirms the new value.</p> <p>You can verify an updated email address or phone number with a <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_VerifyUserAttribute.html">VerifyUserAttribute</a> API request. You can also call the <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_UpdateUserAttributes.html">UpdateUserAttributes</a> or <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_AdminUpdateUserAttributes.html">AdminUpdateUserAttributes</a> API and set 
              <code>email_verified</code> or <code>phone_number_verified</code> to true.</p> <p>When <code>AttributesRequireVerificationBeforeUpdate</code> is false, your user pool doesn't require 
              that your users verify attribute changes before Amazon Cognito updates them. In a user pool where <code>AttributesRequireVerificationBeforeUpdate</code> is false, API operations that 
              change attribute values can immediately update a user’s <code>email</code> or <code>phone_number</code> attribute.</p>
      description: The settings for updates to user attributes. These settings include the property <code>AttributesRequireVerificationBeforeUpdate</code>, a user-pool setting that tells Amazon 
        Cognito how to handle changes to the value of your users' email address and phone number attributes. For more information, see <a 
        href="https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-settings-email-phone-verification.html#user-pool-settings-verifications-verify-attribute-updates"> Verifying updates 
        to email addresses and phone numbers</a>.
    DeviceConfigurationType:
      type: object
      properties:
        ChallengeRequiredOnNewDevice:
          allOf:
          - $ref: "#/components/schemas/BooleanType"
          - description: <p>When true, a remembered device can sign in with device authentication instead of SMS and time-based one-time password (TOTP) factors for multi-factor authentication 
              (MFA).</p> <note> <p>Whether or not <code>ChallengeRequiredOnNewDevice</code> is true, users who sign in with devices that have not been confirmed or remembered must still provide a 
              second factor in a user pool that requires MFA.</p> </note>
        DeviceOnlyRememberedOnUserPrompt:
          allOf:
          - $ref: "#/components/schemas/BooleanType"
          - description: <p>When true, Amazon Cognito doesn't automatically remember a user's device when your app sends a <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_ConfirmDevice.html"> ConfirmDevice</a> API request. In your app, create a prompt for your user to 
              choose whether they want to remember their device. Return the user's choice in an <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_UpdateDeviceStatus.html"> UpdateDeviceStatus</a> API request.</p> <p>When 
              <code>DeviceOnlyRememberedOnUserPrompt</code> is <code>false</code>, Amazon Cognito immediately remembers devices that you register in a <code>ConfirmDevice</code> API request.</p>
      description: <p>The device-remembering configuration for a user pool. A <a href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_DescribeUserPool.html"> 
        DescribeUserPool</a> request returns a null value for this object when the user pool isn't configured to remember devices. When device remembering is active, you can remember a user's device 
        with a <a href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_ConfirmDevice.html">ConfirmDevice</a> API request. Additionally. when the property 
        <code>DeviceOnlyRememberedOnUserPrompt</code> is <code>true</code>, you must follow <code>ConfirmDevice</code> with an <a 
        href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_UpdateDeviceStatus.html">UpdateDeviceStatus</a> API request that sets the user's device to 
        <code>remembered</code> or <code>not_remembered</code>.</p> <p>To sign in with a remembered device, include <code>DEVICE_KEY</code> in the authentication parameters in your user's <a 
        href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_InitiateAuth.html"> InitiateAuth</a> request. If your app doesn't include a <code>DEVICE_KEY</code> 
        parameter, the <a href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_InitiateAuth.html#API_InitiateAuth_ResponseSyntax">response</a> from Amazon Cognito 
        includes newly-generated <code>DEVICE_KEY</code> and <code>DEVICE_GROUP_KEY</code> values under <code>NewDeviceMetadata</code>. Store these values to use in future device-authentication 
        requests.</p> <note> <p>When you provide a value for any property of <code>DeviceConfiguration</code>, you activate the device remembering for the user pool.</p> </note>
    EmailConfigurationType:
      type: object
      properties:
        SourceArn:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: <p>The ARN of a verified email address in Amazon SES. Amazon Cognito uses this email address in one of the following ways, depending on the value that you specify for the 
              <code>EmailSendingAccount</code> parameter:</p> <ul> <li> <p>If you specify <code>COGNITO_DEFAULT</code>, Amazon Cognito uses this address as the custom FROM address when it emails your 
              users using its built-in email account.</p> </li> <li> <p>If you specify <code>DEVELOPER</code>, Amazon Cognito emails your users with this address by calling Amazon SES on your 
              behalf.</p> </li> </ul> <p>The Region value of the <code>SourceArn</code> parameter must indicate a supported Amazon Web Services Region of your user pool. Typically, the Region in the 
              <code>SourceArn</code> and the user pool Region are the same. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-email.html#user-pool-email-developer-region-mapping">Amazon SES email configuration regions</a> in the <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-identity-pools.html">Amazon Cognito Developer Guide</a>.</p>
        ReplyToEmailAddress:
          allOf:
          - $ref: "#/components/schemas/EmailAddressType"
          - description: The destination to which the receiver of the email should reply.
        EmailSendingAccount:
          allOf:
          - $ref: "#/components/schemas/EmailSendingAccountType"
          - description: <p>Specifies whether Amazon Cognito uses its built-in functionality to send your users email messages, or uses your Amazon Simple Email Service email configuration. Specify 
              one of the following values:</p> <dl> <dt>COGNITO_DEFAULT</dt> <dd> <p>When Amazon Cognito emails your users, it uses its built-in email functionality. When you use the default option, 
              Amazon Cognito allows only a limited number of emails each day for your user pool. For typical production environments, the default email limit is less than the required delivery volume.
              To achieve a higher delivery volume, specify DEVELOPER to use your Amazon SES email configuration.</p> <p>To look up the email delivery limit for the default option, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/limits.html">Limits</a> in the <i>Amazon Cognito Developer Guide</i>.</p> <p>The default FROM address is 
              <code>no-reply@verificationemail.com</code>. To customize the FROM address, provide the Amazon Resource Name (ARN) of an Amazon SES verified email address for the <code>SourceArn</code> 
              parameter.</p> </dd> <dt>DEVELOPER</dt> <dd> <p>When Amazon Cognito emails your users, it uses your Amazon SES configuration. Amazon Cognito calls Amazon SES on your behalf to send email
              from your verified email address. When you use this option, the email delivery limits are the same limits that apply to your Amazon SES verified email address in your Amazon Web Services
              account.</p> <p>If you use this option, provide the ARN of an Amazon SES verified email address for the <code>SourceArn</code> parameter.</p> <p>Before Amazon Cognito can email your 
              users, it requires additional permissions to call Amazon SES on your behalf. When you update your user pool with this option, Amazon Cognito creates a <i>service-linked role</i>, which 
              is a type of role in your Amazon Web Services account. This role contains the permissions that allow you to access Amazon SES and send email messages from your email address. For more 
              information about the service-linked role that Amazon Cognito creates, see <a href="https://docs.aws.amazon.com/cognito/latest/developerguide/using-service-linked-roles.html">Using 
              Service-Linked Roles for Amazon Cognito</a> in the <i>Amazon Cognito Developer Guide</i>.</p> </dd> </dl>
        From:
          allOf:
          - $ref: "#/components/schemas/StringType"
          - description: Either the sender’s email address or the sender’s name with their email address. For example, <code>testuser@example.com</code> or <code>Test User 
              &lt;testuser@example.com&gt;</code>. This address appears before the body of the email.
        ConfigurationSet:
          allOf:
          - $ref: "#/components/schemas/SESConfigurationSet"
          - description: "<p>The set of configuration rules that can be applied to emails sent using Amazon Simple Email Service. A configuration set is applied to an email by including a reference to the
              configuration set in the headers of the email. Once applied, all of the rules in that configuration set are applied to the email. Configuration sets can be used to apply the following types
              of rules to emails: </p> <dl> <dt>Event publishing</dt> <dd> <p>Amazon Simple Email Service can track the number of send, delivery, open, click, bounce, and complaint events for each email
              sent. Use event publishing to send information about these events to other Amazon Web Services services such as and Amazon CloudWatch</p> </dd> <dt>IP pool management</dt> <dd> <p>When leasing
              dedicated IP addresses with Amazon Simple Email Service, you can create groups of IP addresses, called dedicated IP pools. You can then associate the dedicated IP pools with configuration
              sets.</p> </dd> </dl>"
      description: <p>The email configuration of your user pool. The email configuration type sets your preferred sending method, Amazon Web Services Region, and sender for messages from your user 
        pool.</p> <note> <p>Amazon Cognito can send email messages with Amazon Simple Email Service resources in the Amazon Web Services Region where you created your user pool, and in alternate 
        Regions in some cases. For more information on the supported Regions, see <a href="https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-email.html">Email settings for Amazon 
        Cognito user pools</a>.</p> </note>
    SmsConfigurationType:
      type: object
      required:
      - SnsCallerArn
      properties:
        SnsCallerArn:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: 'The Amazon Resource Name (ARN) of the Amazon SNS caller. This is the ARN of the IAM role in your Amazon Web Services account that Amazon Cognito will use to send SMS messages.
              SMS messages are subject to a <a href="https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-settings-email-phone-verification.html">spending limit</a>. '
        ExternalId:
          allOf:
          - $ref: "#/components/schemas/StringType"
          - description: <p>The external ID provides additional security for your IAM role. You can use an <code>ExternalId</code> with the IAM role that you use with Amazon SNS to send SMS messages 
              for your user pool. If you provide an <code>ExternalId</code>, your Amazon Cognito user pool includes it in the request to assume your IAM role. You can configure the role trust policy 
              to require that Amazon Cognito, and any principal, provide the <code>ExternalID</code>. If you use the Amazon Cognito Management Console to create a role for SMS multi-factor 
              authentication (MFA), Amazon Cognito creates a role with the required permissions and a trust policy that demonstrates use of the <code>ExternalId</code>.</p> <p>For more information 
              about the <code>ExternalId</code> of a role, see <a href="https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_create_for-user_externalid.html">How to use an external ID when 
              granting access to your Amazon Web Services resources to a third party</a> </p>
        SnsRegion:
          allOf:
          - $ref: "#/components/schemas/RegionCodeType"
          - description: <p>The Amazon Web Services Region to use with Amazon SNS integration. You can choose the same Region as your user pool, or a supported <b>Legacy Amazon SNS alternate 
              Region</b>. </p> <p> Amazon Cognito resources in the Asia Pacific (Seoul) Amazon Web Services Region must use your Amazon SNS configuration in the Asia Pacific (Tokyo) Region. For more 
              information, see <a href="https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-sms-settings.html">SMS message settings for Amazon Cognito user pools</a>.</p>
      description: The SMS configuration type is the settings that your Amazon Cognito user pool must use to send an SMS message from your Amazon Web Services account through Amazon Simple 
        Notification Service. To send SMS messages with Amazon SNS in the Amazon Web Services Region that you want, the Amazon Cognito user pool uses an Identity and Access Management (IAM) role in 
        your Amazon Web Services account.
    UserPoolTagsType:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/TagValueType"
    SchemaAttributesListType:
      type: array
      items:
        $ref: "#/components/schemas/SchemaAttributeType"
      minItems: 1
      maxItems: 50
    UserPoolAddOnsType:
      type: object
      required:
      - AdvancedSecurityMode
      properties:
        AdvancedSecurityMode:
          allOf:
          - $ref: "#/components/schemas/AdvancedSecurityModeType"
          - description: The advanced security mode.
      description: The user pool add-ons type.
    UsernameConfigurationType:
      type: object
      required:
      - CaseSensitive
      properties:
        CaseSensitive:
          allOf:
          - $ref: "#/components/schemas/WrappedBooleanType"
          - description: <p>Specifies whether user name case sensitivity will be applied for all users in the user pool through Amazon Cognito APIs.</p> <p>Valid values include:</p> <dl> <dt>True</dt>
              <dd> <p>Enables case sensitivity for all username input. When this option is set to <code>True</code>, users must sign in using the exact capitalization of their given username, such as 
              “UserName”. This is the default value.</p> </dd> <dt>False</dt> <dd> <p>Enables case insensitivity for all username input. For example, when this option is set to <code>False</code>, 
              users can sign in using either "username" or "Username". This option also enables both <code>preferred_username</code> and <code>email</code> alias to be case insensitive, in addition to
              the <code>username</code> attribute.</p> </dd> </dl>
      description: "The username configuration type. "
    UserPoolType:
      type: object
      properties:
        Id:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The ID of the user pool.
        Name:
          allOf:
          - $ref: "#/components/schemas/UserPoolNameType"
          - description: The name of the user pool.
        Policies:
          allOf:
          - $ref: "#/components/schemas/UserPoolPolicyType"
          - description: The policies associated with the user pool.
        DeletionProtection:
          allOf:
          - $ref: "#/components/schemas/DeletionProtectionType"
          - description: <p>When active, <code>DeletionProtection</code> prevents accidental deletion of your user pool. Before you can delete a user pool that you have protected against deletion, you
              must deactivate this feature.</p> <p>When you try to delete a protected user pool in a <code>DeleteUserPool</code> API request, Amazon Cognito returns an 
              <code>InvalidParameterException</code> error. To delete a protected user pool, send a new <code>DeleteUserPool</code> request after you deactivate deletion protection in an 
              <code>UpdateUserPool</code> API request.</p>
        LambdaConfig:
          allOf:
          - $ref: "#/components/schemas/LambdaConfigType"
          - description: The Lambda triggers associated with the user pool.
        Status:
          allOf:
          - $ref: "#/components/schemas/StatusType"
          - description: The status of a user pool.
        LastModifiedDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the user pool was last modified.
        CreationDate:
          allOf:
          - $ref: "#/components/schemas/DateType"
          - description: The date the user pool was created.
        SchemaAttributes:
          allOf:
          - $ref: "#/components/schemas/SchemaAttributesListType"
          - description: A container with the schema attributes of a user pool.
        AutoVerifiedAttributes:
          allOf:
          - $ref: "#/components/schemas/VerifiedAttributesListType"
          - description: The attributes that are auto-verified in a user pool.
        AliasAttributes:
          allOf:
          - $ref: "#/components/schemas/AliasAttributesListType"
          - description: The attributes that are aliased in a user pool.
        UsernameAttributes:
          allOf:
          - $ref: "#/components/schemas/UsernameAttributesListType"
          - description: Specifies whether a user can use an email address or phone number as a username when they sign up.
        SmsVerificationMessage:
          allOf:
          - $ref: "#/components/schemas/SmsVerificationMessageType"
          - description: This parameter is no longer used. See <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_VerificationMessageTemplateType.html">VerificationMessageTemplateType</a>.
        EmailVerificationMessage:
          allOf:
          - $ref: "#/components/schemas/EmailVerificationMessageType"
          - description: This parameter is no longer used. See <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_VerificationMessageTemplateType.html">VerificationMessageTemplateType</a>.
        EmailVerificationSubject:
          allOf:
          - $ref: "#/components/schemas/EmailVerificationSubjectType"
          - description: This parameter is no longer used. See <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_VerificationMessageTemplateType.html">VerificationMessageTemplateType</a>.
        VerificationMessageTemplate:
          allOf:
          - $ref: "#/components/schemas/VerificationMessageTemplateType"
          - description: The template for verification messages.
        SmsAuthenticationMessage:
          allOf:
          - $ref: "#/components/schemas/SmsVerificationMessageType"
          - description: The contents of the SMS authentication message.
        UserAttributeUpdateSettings:
          allOf:
          - $ref: "#/components/schemas/UserAttributeUpdateSettingsType"
          - description: The settings for updates to user attributes. These settings include the property <code>AttributesRequireVerificationBeforeUpdate</code>, a user-pool setting that tells Amazon 
              Cognito how to handle changes to the value of your users' email address and phone number attributes. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-settings-email-phone-verification.html#user-pool-settings-verifications-verify-attribute-updates"> Verifying 
              updates to email addresses and phone numbers</a>.
        MfaConfiguration:
          allOf:
          - $ref: "#/components/schemas/UserPoolMfaType"
          - description: <p>Can be one of the following values:</p> <ul> <li> <p> <code>OFF</code> - MFA tokens aren't required and can't be specified during user registration.</p> </li> <li> <p> 
              <code>ON</code> - MFA tokens are required for all user registrations. You can only specify required when you're initially creating a user pool.</p> </li> <li> <p> <code>OPTIONAL</code> -
              Users have the option when registering to create an MFA token.</p> </li> </ul>
        DeviceConfiguration:
          allOf:
          - $ref: "#/components/schemas/DeviceConfigurationType"
          - description: <p>The device-remembering configuration for a user pool. A null value indicates that you have deactivated device remembering in your user pool.</p> <note> <p>When you provide 
              a value for any <code>DeviceConfiguration</code> field, you activate the Amazon Cognito device-remembering feature.</p> </note>
        EstimatedNumberOfUsers:
          allOf:
          - $ref: "#/components/schemas/IntegerType"
          - description: A number estimating the size of the user pool.
        EmailConfiguration:
          allOf:
          - $ref: "#/components/schemas/EmailConfigurationType"
          - description: The email configuration of your user pool. The email configuration type sets your preferred sending method, Amazon Web Services Region, and sender for messages tfrom your user
              pool.
        SmsConfiguration:
          allOf:
          - $ref: "#/components/schemas/SmsConfigurationType"
          - description: The SMS configuration with the settings that your Amazon Cognito user pool must use to send an SMS message from your Amazon Web Services account through Amazon Simple 
              Notification Service. To send SMS messages with Amazon SNS in the Amazon Web Services Region that you want, the Amazon Cognito user pool uses an Identity and Access Management (IAM) role
              in your Amazon Web Services account.
        UserPoolTags:
          allOf:
          - $ref: "#/components/schemas/UserPoolTagsType"
          - description: The tags that are assigned to the user pool. A tag is a label that you can apply to user pools to categorize and manage them in different ways, such as by purpose, owner, 
              environment, or other criteria.
        SmsConfigurationFailure:
          allOf:
          - $ref: "#/components/schemas/StringType"
          - description: <p>The reason why the SMS configuration can't send the messages to your users.</p> <p>This message might include comma-separated values to describe why your SMS configuration 
              can't send messages to user pool end users.</p> <dl> <dt>InvalidSmsRoleAccessPolicyException</dt> <dd> <p>The Identity and Access Management role that Amazon Cognito uses to send SMS 
              messages isn't properly configured. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_SmsConfigurationType.html">SmsConfigurationType</a>.</p> </dd> <dt>SNSSandbox</dt> <dd> <p>The 
              Amazon Web Services account is in the SNS SMS Sandbox and messages will only reach verified end users. This parameter won’t get populated with SNSSandbox if the IAM user creating the 
              user pool doesn’t have SNS permissions. To learn how to move your Amazon Web Services account out of the sandbox, see <a 
              href="https://docs.aws.amazon.com/sns/latest/dg/sns-sms-sandbox-moving-to-production.html">Moving out of the SMS sandbox</a>.</p> </dd> </dl>
        EmailConfigurationFailure:
          allOf:
          - $ref: "#/components/schemas/StringType"
          - description: Deprecated. Review error codes from API requests with <code>EventSource:cognito-idp.amazonaws.com</code> in CloudTrail for information about problems with user pool email 
              configuration.
        Domain:
          allOf:
          - $ref: "#/components/schemas/DomainType"
          - description: The domain prefix, if the user pool has a domain associated with it.
        CustomDomain:
          allOf:
          - $ref: "#/components/schemas/DomainType"
          - description: <p>A custom domain name that you provide to Amazon Cognito. This parameter applies only if you use a custom domain to host the sign-up and sign-in pages for your application. 
              An example of a custom domain name might be <code>auth.example.com</code>.</p> <p>For more information about adding a custom domain to your user pool, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pools-add-custom-domain.html">Using Your Own Domain for the Hosted UI</a>.</p>
        AdminCreateUserConfig:
          allOf:
          - $ref: "#/components/schemas/AdminCreateUserConfigType"
          - description: The configuration for <code>AdminCreateUser</code> requests.
        UserPoolAddOns:
          allOf:
          - $ref: "#/components/schemas/UserPoolAddOnsType"
          - description: The user pool add-ons.
        UsernameConfiguration:
          allOf:
          - $ref: "#/components/schemas/UsernameConfigurationType"
          - description: Case sensitivity of the username input for the selected sign-in option. For example, when case sensitivity is set to <code>False</code>, users can sign in using either 
              "username" or "Username". This configuration is immutable once it has been set. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_UsernameConfigurationType.html">UsernameConfigurationType</a>.
        Arn:
          allOf:
          - $ref: "#/components/schemas/ArnType"
          - description: The Amazon Resource Name (ARN) for the user pool.
        AccountRecoverySetting:
          allOf:
          - $ref: "#/components/schemas/AccountRecoverySettingType"
          - description: The available verified method a user can use to recover their password when they call <code>ForgotPassword</code>. You can use this setting to define a preferred method when a
              user has more than one method available. With this setting, SMS doesn't qualify for a valid password recovery mechanism if the user also has SMS multi-factor authentication (MFA) 
              activated. In the absence of this setting, Amazon Cognito uses the legacy behavior to determine the recovery method where SMS is preferred through email.
      description: A container for information about the user pool.
    CustomAttributeNameType:
      type: string
      pattern: "[\\p{L}\\p{M}\\p{S}\\p{N}\\p{P}]+"
      minLength: 1
      maxLength: 20
    SchemaAttributeType:
      type: object
      properties:
        Name:
          allOf:
          - $ref: "#/components/schemas/CustomAttributeNameType"
          - description: A schema attribute of the name type.
        AttributeDataType:
          allOf:
          - $ref: "#/components/schemas/AttributeDataType"
          - description: The attribute data type.
        DeveloperOnlyAttribute:
          allOf:
          - $ref: "#/components/schemas/BooleanType"
          - description: <note> <p>You should use <a 
              href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_UserPoolClientType.html#CognitoUserPools-Type-UserPoolClientType-WriteAttributes">WriteAttributes</a>
              in the user pool client to control how attributes can be mutated for new use cases instead of using <code>DeveloperOnlyAttribute</code>.</p> </note> <p>Specifies whether the attribute 
              type is developer only. This attribute can only be modified by an administrator. Users won't be able to modify this attribute using their access token. For example, 
              <code>DeveloperOnlyAttribute</code> can be modified using AdminUpdateUserAttributes but can't be updated using UpdateUserAttributes.</p>
        Mutable:
          allOf:
          - $ref: "#/components/schemas/BooleanType"
          - description: <p>Specifies whether the value of the attribute can be changed.</p> <p>For any user pool attribute that is mapped to an IdP attribute, you must set this parameter to 
              <code>true</code>. Amazon Cognito updates mapped attributes when users sign in to your application through an IdP. If an attribute is immutable, Amazon Cognito throws an error when it 
              attempts to update the attribute. For more information, see <a 
              href="https://docs.aws.amazon.com/cognito/latest/developerguide/cognito-user-pools-specifying-attribute-mapping.html">Specifying Identity Provider Attribute Mappings for Your User 
              Pool</a>.</p>
        Required:
          allOf:
          - $ref: "#/components/schemas/BooleanType"
          - description: Specifies whether a user pool attribute is required. If the attribute is required and the user doesn't provide a value, registration or sign-in will fail.
        NumberAttributeConstraints:
          allOf:
          - $ref: "#/components/schemas/NumberAttributeConstraintsType"
          - description: Specifies the constraints for an attribute of the number type.
        StringAttributeConstraints:
          allOf:
          - $ref: "#/components/schemas/StringAttributeConstraintsType"
          - description: Specifies the constraints for an attribute of the string type.
      description: Contains information about the schema attribute.
    CustomEmailSenderLambdaVersionType:
