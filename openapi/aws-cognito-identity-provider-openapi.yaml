    CreateUserPoolDomainRequest:
      type: object
      required:
      - Domain
      - UserPoolId
      title: CreateUserPoolDomainRequest
      properties:
        Domain:
          allOf:
          - $ref: "#/components/schemas/DomainType"
          - description: The domain string. For custom domains, this is the fully-qualified domain name, such as <code>auth.example.com</code>. For Amazon Cognito prefix domains, this is the prefix 
              alone, such as <code>auth</code>.
        UserPoolId:
          allOf:
          - $ref: "#/components/schemas/UserPoolIdType"
          - description: The user pool ID.
        CustomDomainConfig:
