          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                AdminLinkProviderForUser482Example:
                  summary: Default AdminLinkProviderForUser 482 response
                  x-microcks-default: true
                  value: example
        '483':
          description: NotAuthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotAuthorizedException'
              examples:
                AdminLinkProviderForUser483Example:
                  summary: Default AdminLinkProviderForUser 483 response
                  x-microcks-default: true
                  value: example
        '484':
          description: UserNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundException'
              examples:
                AdminLinkProviderForUser484Example:
                  summary: Default AdminLinkProviderForUser 484 response
                  x-microcks-default: true
                  value: example
        '485':
          description: AliasExistsException
          content:
