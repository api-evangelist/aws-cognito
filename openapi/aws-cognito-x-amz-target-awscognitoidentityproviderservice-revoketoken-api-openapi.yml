    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: RevokeToken
      description: Revokes all of the access tokens generated by, and at the same time as, the specified refresh token. After a token is revoked, you can't use the revoked token to access Amazon Cognito user APIs, or to authorize access to your resource server.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeTokenResponse'
        '480':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                RevokeToken480Example:
                  summary: Default RevokeToken 480 response
                  x-microcks-default: true
                  value: example
        '481':
          description: InternalErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorException'
              examples:
                RevokeToken481Example:
                  summary: Default RevokeToken 481 response
                  x-microcks-default: true
                  value: example
        '482':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
              examples:
                RevokeToken482Example:
                  summary: Default RevokeToken 482 response
                  x-microcks-default: true
                  value: example
        '483':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
              examples:
                RevokeToken483Example:
                  summary: Default RevokeToken 483 response
                  x-microcks-default: true
                  value: example
        '484':
          description: UnsupportedOperationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnsupportedOperationException'
              examples:
                RevokeToken484Example:
                  summary: Default RevokeToken 484 response
                  x-microcks-default: true
                  value: example
        '485':
          description: UnsupportedTokenTypeException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnsupportedTokenTypeException'
              examples:
                RevokeToken485Example:
                  summary: Default RevokeToken 485 response
                  x-microcks-default: true
                  value: example
        '486':
          description: ForbiddenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
              examples:
                RevokeToken486Example:
                  summary: Default RevokeToken 486 response
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeTokenRequest'
            examples:
              RevokeTokenRequestExample:
                summary: Default RevokeToken request
                x-microcks-default: true
                value:
                  Token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                  ClientId: us-east-1_AbCdEfGhI
                  ClientSecret: example-value
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AWSCognitoIdentityProviderService.RevokeToken
      summary: Amazon Cognito Revoke Token
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=AWSCognitoIdentityProviderService.RevokeToken'
