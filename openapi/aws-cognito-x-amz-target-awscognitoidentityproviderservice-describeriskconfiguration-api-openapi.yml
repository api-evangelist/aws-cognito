components:
  schemas:
    ResourceNotFoundException: {}
    AccountTakeoverActionType:
      type: object
      required:
      - Notify
      - EventAction
      properties:
        Notify:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverActionNotifyType'
          - description: Flag specifying whether to send a notification.
        EventAction:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverEventActionType'
          - description: <p>The action to take in response to the account takeover action. Valid values are as follows:</p> <ul> <li> <p> <code>BLOCK</code> Choosing this action will block the request.</p> </li> <li> <p> <code>MFA_IF_CONFIGURED</code> Present an MFA challenge if user has configured it, else allow the request.</p> </li> <li> <p> <code>MFA_REQUIRED</code> Present an MFA challenge if user has configured it, else block the request.</p> </li> <li> <p> <code>NO_ACTION</code> Allow the user to sign in.</p> </li> </ul>
      description: Account takeover action type.
    UserPoolAddOnNotEnabledException: {}
    NotifyConfigurationType:
      type: object
      required:
      - SourceArn
      properties:
        From:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The email address that is sending the email. The address must be either individually verified with Amazon Simple Email Service, or from a domain that has been verified with Amazon SES.
        ReplyTo:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The destination to which the receiver of an email should reply to.
        SourceArn:
          allOf:
          - $ref: '#/components/schemas/ArnType'
          - description: The Amazon Resource Name (ARN) of the identity that is associated with the sending authorization policy. This identity permits Amazon Cognito to send for the email address specified in the <code>From</code> parameter.
        BlockEmail:
          allOf:
          - $ref: '#/components/schemas/NotifyEmailType'
          - description: Email template used when a detected risk event is blocked.
        NoActionEmail:
          allOf:
          - $ref: '#/components/schemas/NotifyEmailType'
          - description: The email template used when a detected risk event is allowed.
        MfaEmail:
          allOf:
          - $ref: '#/components/schemas/NotifyEmailType'
          - description: The multi-factor authentication (MFA) email template used when MFA is challenged as part of a detected risk.
      description: The notify configuration type.
    AccountTakeoverActionsType:
      type: object
      properties:
        LowAction:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverActionType'
          - description: Action to take for a low risk.
        MediumAction:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverActionType'
          - description: Action to take for a medium risk.
        HighAction:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverActionType'
          - description: Action to take for a high risk.
      description: Account takeover actions type.
    DateType:
      type: string
      format: date-time
    NotifyEmailType:
      type: object
      required:
      - Subject
      properties:
        Subject:
          allOf:
          - $ref: '#/components/schemas/EmailNotificationSubjectType'
          - description: The email subject.
        HtmlBody:
          allOf:
          - $ref: '#/components/schemas/EmailNotificationBodyType'
          - description: The email HTML body.
        TextBody:
          allOf:
          - $ref: '#/components/schemas/EmailNotificationBodyType'
          - description: The email text body.
      description: The notify email type.
    AccountTakeoverEventActionType:
      type: string
      enum:
      - BLOCK
      - MFA_IF_CONFIGURED
      - MFA_REQUIRED
      - NO_ACTION
    InvalidParameterException: {}
    SkippedIPRangeListType:
      type: array
      items:
        $ref: '#/components/schemas/StringType'
      maxItems: 200
    EventFiltersType:
      type: array
      items:
        $ref: '#/components/schemas/EventFilterType'
    AccountTakeoverActionNotifyType:
      type: boolean
    TooManyRequestsException: {}
    InternalErrorException: {}
    EmailNotificationSubjectType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}\s]+'
      minLength: 1
      maxLength: 140
    EventFilterType:
      type: string
      enum:
      - SIGN_IN
      - PASSWORD_CHANGE
      - SIGN_UP
    StringType:
      type: string
    DescribeRiskConfigurationRequest:
      type: object
      required:
      - UserPoolId
      title: DescribeRiskConfigurationRequest
      properties:
        UserPoolId:
          allOf:
          - $ref: '#/components/schemas/UserPoolIdType'
          - description: The user pool ID.
        ClientId:
          allOf:
          - $ref: '#/components/schemas/ClientIdType'
          - description: The app client ID.
    DescribeRiskConfigurationResponse:
      type: object
      required:
      - RiskConfiguration
      properties:
        RiskConfiguration:
          allOf:
          - $ref: '#/components/schemas/RiskConfigurationType'
          - description: The risk configuration.
    NotAuthorizedException: {}
    ClientIdType:
      type: string
      pattern: '[\w+]+'
      minLength: 1
      maxLength: 128
      format: password
    AccountTakeoverRiskConfigurationType:
      type: object
      required:
      - Actions
      properties:
        NotifyConfiguration:
          allOf:
          - $ref: '#/components/schemas/NotifyConfigurationType'
          - description: The notify configuration used to construct email notifications.
        Actions:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverActionsType'
          - description: Account takeover risk configuration actions.
      description: Configuration for mitigation actions and notification for different levels of risk detected for a potential account takeover.
    CompromisedCredentialsActionsType:
      type: object
      required:
      - EventAction
      properties:
        EventAction:
          allOf:
          - $ref: '#/components/schemas/CompromisedCredentialsEventActionType'
          - description: The event action.
      description: The compromised credentials actions type.
    RiskConfigurationType:
      type: object
      properties:
        UserPoolId:
          allOf:
          - $ref: '#/components/schemas/UserPoolIdType'
          - description: The user pool ID.
        ClientId:
          allOf:
          - $ref: '#/components/schemas/ClientIdType'
          - description: The app client ID.
        CompromisedCredentialsRiskConfiguration:
          allOf:
          - $ref: '#/components/schemas/CompromisedCredentialsRiskConfigurationType'
          - description: The compromised credentials risk configuration object, including the <code>EventFilter</code> and the <code>EventAction</code>.
        AccountTakeoverRiskConfiguration:
          allOf:
          - $ref: '#/components/schemas/AccountTakeoverRiskConfigurationType'
          - description: The account takeover risk configuration object, including the <code>NotifyConfiguration</code> object and <code>Actions</code> to take if there is an account takeover.
        RiskExceptionConfiguration:
          allOf:
          - $ref: '#/components/schemas/RiskExceptionConfigurationType'
          - description: The configuration to override the risk decision.
        LastModifiedDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The last modified date.
      description: The risk configuration type.
    UserPoolIdType:
      type: string
      pattern: '[\w-]+_[0-9a-zA-Z]+'
      minLength: 1
      maxLength: 55
    EmailNotificationBodyType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}\s*]+'
      minLength: 6
      maxLength: 20000
    ArnType:
      type: string
      pattern: arn:[\w+=/,.@-]+:[\w+=/,.@-]+:([\w+=/,.@-]*)?:[0-9]+:[\w+=/,.@-]+(:[\w+=/,.@-]+)?(:[\w+=/,.@-]+)?
      minLength: 20
      maxLength: 2048
    CompromisedCredentialsRiskConfigurationType:
      type: object
      required:
      - Actions
      properties:
        EventFilter:
          allOf:
          - $ref: '#/components/schemas/EventFiltersType'
          - description: Perform the action for these events. The default is to perform all events if no event filter is specified.
        Actions:
          allOf:
          - $ref: '#/components/schemas/CompromisedCredentialsActionsType'
          - description: The compromised credentials risk configuration actions.
      description: The compromised credentials risk configuration type.
    RiskExceptionConfigurationType:
      type: object
      properties:
        BlockedIPRangeList:
          allOf:
          - $ref: '#/components/schemas/BlockedIPRangeListType'
          - description: Overrides the risk decision to always block the pre-authentication requests. The IP range is in CIDR notation, a compact representation of an IP address and its routing prefix.
        SkippedIPRangeList:
          allOf:
          - $ref: '#/components/schemas/SkippedIPRangeListType'
          - description: Risk detection isn't performed on the IP addresses in this range list. The IP range is in CIDR notation.
      description: The type of the configuration to override the risk decision.
    CompromisedCredentialsEventActionType:
      type: string
      enum:
      - BLOCK
      - NO_ACTION
    BlockedIPRangeListType:
      type: array
      items:
        $ref: '#/components/schemas/StringType'
      maxItems: 200
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
