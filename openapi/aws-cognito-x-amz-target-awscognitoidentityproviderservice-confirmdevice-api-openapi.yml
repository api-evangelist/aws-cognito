components:
  schemas:
    ResourceNotFoundException: {}
    ConfirmDeviceResponse:
      type: object
      properties:
        UserConfirmationNecessary:
          allOf:
          - $ref: '#/components/schemas/BooleanType'
          - description: Indicates whether the user confirmation must confirm the device response.
      description: Confirms the device response.
    UserNotFoundException: {}
    InvalidPasswordException: {}
    DeviceNameType:
      type: string
      minLength: 1
      maxLength: 1024
    UserNotConfirmedException: {}
    InvalidParameterException: {}
    TooManyRequestsException: {}
    InternalErrorException: {}
    StringType:
      type: string
    InvalidLambdaResponseException: {}
    DeviceSecretVerifierConfigType:
      type: object
      properties:
        PasswordVerifier:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The password verifier.
        Salt:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: 'The <a href="https://en.wikipedia.org/wiki/Salt_(cryptography)">salt</a> '
      description: The device verifier against which it is authenticated.
    NotAuthorizedException: {}
    ConfirmDeviceRequest:
      type: object
      required:
      - AccessToken
      - DeviceKey
      title: ConfirmDeviceRequest
      properties:
        AccessToken:
          allOf:
          - $ref: '#/components/schemas/TokenModelType'
          - description: A valid access token that Amazon Cognito issued to the user whose device you want to confirm.
        DeviceKey:
          allOf:
          - $ref: '#/components/schemas/DeviceKeyType'
          - description: The device key.
        DeviceSecretVerifierConfig:
          allOf:
          - $ref: '#/components/schemas/DeviceSecretVerifierConfigType'
          - description: The configuration of the device secret verifier.
        DeviceName:
          allOf:
          - $ref: '#/components/schemas/DeviceNameType'
          - description: The device name.
      description: Confirms the device request.
    PasswordResetRequiredException: {}
    TokenModelType:
      type: string
      pattern: '[A-Za-z0-9-_=.]+'
      format: password
    InvalidUserPoolConfigurationException: {}
    BooleanType:
      type: boolean
    UsernameExistsException: {}
    ForbiddenException: {}
    DeviceKeyType:
      type: string
      pattern: '[\w-]+_[0-9a-f-]+'
      minLength: 1
      maxLength: 55
