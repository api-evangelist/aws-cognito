paths:
  /#X-Amz-Target=AWSCognitoIdentityProviderService.AssociateSoftwareToken:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: AssociateSoftwareToken
      description: <p>Begins setup of time-based one-time password (TOTP) multi-factor authentication (MFA) for a user, with a unique private key that Amazon Cognito generates and returns in the API response. You can authorize an <code>AssociateSoftwareToken</code> request with either the user's access token, or a session string from a challenge response that you received from Amazon Cognito.</p> <note> <p>Amazon Cognito disassociates an existing software token when you verify the new token in a <a href="https://docs.aws.amazon.com/cognito-user-identity-pools/latest/APIReference/API_VerifySoftwareToken.html"> VerifySoftwareToken</a> API request. If you don't verify the software token and your user pool doesn't require MFA, the user can then authenticate with user name and password credentials alone. If your user pool requires TOTP MFA, Amazon Cognito generates an <code>MFA_SETUP</code> or <code>SOFTWARE_TOKEN_SETUP</code> challenge each time your user signs. Complete setup with <code>AssociateSoftwareToken</code> and <code>VerifySoftwareToken</code>.</p> <p>After you set up software token MFA for your user, Amazon Cognito generates a <code>SOFTWARE_TOKEN_MFA</code> challenge when they authenticate. Respond to this challenge with your user's TOTP.</p> </note>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssociateSoftwareTokenResponse'
              examples:
                AssociateSoftwareToken200Example:
                  summary: Default AssociateSoftwareToken 200 response
                  x-microcks-default: true
                  value:
                    SecretCode: example-value
                    Session: example-value
        '480':
          description: ConcurrentModificationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcurrentModificationException'
              examples:
                AssociateSoftwareToken480Example:
                  summary: Default AssociateSoftwareToken 480 response
                  x-microcks-default: true
                  value: example
        '481':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
              examples:
                AssociateSoftwareToken481Example:
                  summary: Default AssociateSoftwareToken 481 response
                  x-microcks-default: true
                  value: example
        '482':
          description: NotAuthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotAuthorizedException'
              examples:
                AssociateSoftwareToken482Example:
                  summary: Default AssociateSoftwareToken 482 response
                  x-microcks-default: true
                  value: example
        '483':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
              examples:
                AssociateSoftwareToken483Example:
                  summary: Default AssociateSoftwareToken 483 response
                  x-microcks-default: true
                  value: example
        '484':
          description: InternalErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorException'
              examples:
                AssociateSoftwareToken484Example:
                  summary: Default AssociateSoftwareToken 484 response
                  x-microcks-default: true
                  value: example
        '485':
          description: SoftwareTokenMFANotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoftwareTokenMFANotFoundException'
              examples:
                AssociateSoftwareToken485Example:
                  summary: Default AssociateSoftwareToken 485 response
                  x-microcks-default: true
                  value: example
        '486':
          description: ForbiddenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
              examples:
                AssociateSoftwareToken486Example:
                  summary: Default AssociateSoftwareToken 486 response
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssociateSoftwareTokenRequest'
            examples:
              AssociateSoftwareTokenRequestExample:
                summary: Default AssociateSoftwareToken request
                x-microcks-default: true
                value:
                  AccessToken: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                  Session: example-value
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AWSCognitoIdentityProviderService.AssociateSoftwareToken
      summary: Amazon Cognito Associate Software Token
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=AWSCognitoIdentityProviderService.AssociateSoftwareToken'
components:
  schemas:
    ResourceNotFoundException: {}
    SessionType:
      type: string
      minLength: 20
      maxLength: 2048
    AssociateSoftwareTokenRequest:
      type: object
      title: AssociateSoftwareTokenRequest
      properties:
        AccessToken:
          allOf:
          - $ref: '#/components/schemas/TokenModelType'
          - description: A valid access token that Amazon Cognito issued to the user whose software token you want to generate.
        Session:
          allOf:
          - $ref: '#/components/schemas/SessionType'
          - description: The session that should be passed both ways in challenge-response calls to the service. This allows authentication of the user as part of the MFA setup process.
    InvalidParameterException: {}
    InternalErrorException: {}
    SoftwareTokenMFANotFoundException: {}
    NotAuthorizedException: {}
    AssociateSoftwareTokenResponse:
      type: object
      properties:
        SecretCode:
          allOf:
          - $ref: '#/components/schemas/SecretCodeType'
          - description: A unique generated shared secret code that is used in the TOTP algorithm to generate a one-time code.
        Session:
          allOf:
          - $ref: '#/components/schemas/SessionType'
          - description: The session that should be passed both ways in challenge-response calls to the service. This allows authentication of the user as part of the MFA setup process.
    TokenModelType:
      type: string
      pattern: '[A-Za-z0-9-_=.]+'
      format: password
    ConcurrentModificationException: {}
    ForbiddenException: {}
    SecretCodeType:
      type: string
      pattern: '[A-Za-z0-9]+'
      minLength: 16
      format: password
  parameters:
