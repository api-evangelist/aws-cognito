components:
  schemas:
    ResourceNotFoundException: {}
    AttributeNameType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}]+'
      minLength: 1
      maxLength: 32
    UserNotFoundException: {}
    DeliveryMediumType:
      type: string
      enum:
      - SMS
      - EMAIL
    UserNotConfirmedException: {}
    InvalidParameterException: {}
    InternalErrorException: {}
    MFAOptionListType:
      type: array
      items:
        $ref: '#/components/schemas/MFAOptionType'
    NotAuthorizedException: {}
    PasswordResetRequiredException: {}
    SetUserSettingsRequest:
      type: object
      required:
      - AccessToken
      - MFAOptions
      title: SetUserSettingsRequest
      properties:
        AccessToken:
          allOf:
          - $ref: '#/components/schemas/TokenModelType'
          - description: A valid access token that Amazon Cognito issued to the user whose user settings you want to configure.
        MFAOptions:
          allOf:
          - $ref: '#/components/schemas/MFAOptionListType'
          - description: You can use this parameter only to set an SMS configuration that uses SMS for delivery.
      description: Represents the request to set user settings.
    TokenModelType:
      type: string
      pattern: '[A-Za-z0-9-_=.]+'
      format: password
    ForbiddenException: {}
    MFAOptionType:
      type: object
      properties:
        DeliveryMedium:
          allOf:
          - $ref: '#/components/schemas/DeliveryMediumType'
          - description: The delivery medium to send the MFA code. You can use this parameter to set only the <code>SMS</code> delivery medium value.
        AttributeName:
          allOf:
          - $ref: '#/components/schemas/AttributeNameType'
          - description: The attribute name of the MFA option type. The only valid value is <code>phone_number</code>.
      description: ' <i>This data type is no longer supported.</i> Applies only to SMS multi-factor authentication (MFA) configurations. Does not apply to time-based one-time password (TOTP) software token MFA configurations.'
    SetUserSettingsResponse:
      type: object
      properties: {}
      description: The response from the server for a set user settings request.
