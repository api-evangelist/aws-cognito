tags:
- name: '#X Amz Target=AWSCognitoIdentityService.MergeDeveloperIdentities'
paths:
  /#X-Amz-Target=AWSCognitoIdentityService.MergeDeveloperIdentities:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: MergeDeveloperIdentities
      description: <p>Merges two users having different <code>IdentityId</code>s, existing in the same identity pool, and identified by the same developer provider. You can use this action to request that discrete users be merged and identified as a single user in the Cognito environment. Cognito associates the given source user (<code>SourceUserIdentifier</code>) with the <code>IdentityId</code> of the <code>DestinationUserIdentifier</code>. Only developer-authenticated users can be merged. If the users to be merged are associated with the same public provider, but as two different users, an exception will be thrown.</p> <p>The number of linked logins is limited to 20. So, the number of linked logins for the source user, <code>SourceUserIdentifier</code>, and the destination user, <code>DestinationUserIdentifier</code>, together should not be larger than 20. Otherwise, an exception will be thrown.</p> <p>You must use AWS Developer credentials to call this API.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeDeveloperIdentitiesResponse'
              examples:
                MergeDeveloperIdentities200Example:
                  summary: Default MergeDeveloperIdentities 200 response
                  x-microcks-default: true
                  value:
                    IdentityId: us-east-1_AbCdEfGhI
        '480':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
              examples:
                MergeDeveloperIdentities480Example:
                  summary: Default MergeDeveloperIdentities 480 response
                  x-microcks-default: true
                  value: example
        '481':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
              examples:
                MergeDeveloperIdentities481Example:
                  summary: Default MergeDeveloperIdentities 481 response
                  x-microcks-default: true
                  value: example
        '482':
          description: NotAuthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotAuthorizedException'
              examples:
                MergeDeveloperIdentities482Example:
                  summary: Default MergeDeveloperIdentities 482 response
                  x-microcks-default: true
                  value: example
        '483':
          description: ResourceConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceConflictException'
              examples:
                MergeDeveloperIdentities483Example:
                  summary: Default MergeDeveloperIdentities 483 response
                  x-microcks-default: true
                  value: example
        '484':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                MergeDeveloperIdentities484Example:
                  summary: Default MergeDeveloperIdentities 484 response
                  x-microcks-default: true
                  value: example
        '485':
          description: InternalErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorException'
              examples:
                MergeDeveloperIdentities485Example:
                  summary: Default MergeDeveloperIdentities 485 response
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeDeveloperIdentitiesInput'
            examples:
              MergeDeveloperIdentitiesRequestExample:
                summary: Default MergeDeveloperIdentities request
                x-microcks-default: true
                value:
                  SourceUserIdentifier: us-east-1_AbCdEfGhI
                  DestinationUserIdentifier: us-east-1_AbCdEfGhI
                  DeveloperProviderName: my-user-pool
                  IdentityPoolId: us-east-1_AbCdEfGhI
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AWSCognitoIdentityService.MergeDeveloperIdentities
      summary: Amazon Cognito Merge Developer Identities
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=AWSCognitoIdentityService.MergeDeveloperIdentities'
components:
  schemas:
    ResourceNotFoundException: {}
    MergeDeveloperIdentitiesInput:
      type: object
      required:
      - SourceUserIdentifier
      - DestinationUserIdentifier
      - DeveloperProviderName
      - IdentityPoolId
      title: MergeDeveloperIdentitiesInput
      properties:
        SourceUserIdentifier:
          allOf:
          - $ref: '#/components/schemas/DeveloperUserIdentifier'
          - description: User identifier for the source user. The value should be a <code>DeveloperUserIdentifier</code>.
        DestinationUserIdentifier:
          allOf:
          - $ref: '#/components/schemas/DeveloperUserIdentifier'
          - description: User identifier for the destination user. The value should be a <code>DeveloperUserIdentifier</code>.
        DeveloperProviderName:
          allOf:
          - $ref: '#/components/schemas/DeveloperProviderName'
          - description: The "domain" by which Cognito will refer to your users. This is a (pseudo) domain name that you provide while creating an identity pool. This name acts as a placeholder that allows your backend and the Cognito service to communicate about the developer provider. For the <code>DeveloperProviderName</code>, you can use letters as well as period (.), underscore (_), and dash (-).
        IdentityPoolId:
          allOf:
          - $ref: '#/components/schemas/IdentityPoolId'
          - description: An identity pool ID in the format REGION:GUID.
      description: Input to the <code>MergeDeveloperIdentities</code> action.
    MergeDeveloperIdentitiesResponse:
      type: object
      properties:
        IdentityId:
          allOf:
          - $ref: '#/components/schemas/IdentityId'
          - description: A unique identifier in the format REGION:GUID.
      description: Returned in response to a successful <code>MergeDeveloperIdentities</code> action.
    IdentityId:
      type: string
      pattern: '[\w-]+:[0-9a-f-]+'
      minLength: 1
      maxLength: 55
    IdentityPoolId:
      type: string
      pattern: '[\w-]+:[0-9a-f-]+'
      minLength: 1
      maxLength: 55
    DeveloperUserIdentifier:
      type: string
      minLength: 1
      maxLength: 1024
    InvalidParameterException: {}
    TooManyRequestsException: {}
    InternalErrorException: {}
    NotAuthorizedException: {}
    DeveloperProviderName:
      type: string
      pattern: '[\w._-]+'
      minLength: 1
      maxLength: 128
    ResourceConflictException: {}
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
