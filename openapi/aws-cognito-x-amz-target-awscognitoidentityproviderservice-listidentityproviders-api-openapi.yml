components:
  schemas:
    ResourceNotFoundException: {}
    IdentityProviderTypeType:
      type: string
      enum:
      - SAML
      - Facebook
      - Google
      - LoginWithAmazon
      - SignInWithApple
      - OIDC
    ListIdentityProvidersRequest:
      type: object
      required:
      - UserPoolId
      title: ListIdentityProvidersRequest
      properties:
        UserPoolId:
          allOf:
          - $ref: '#/components/schemas/UserPoolIdType'
          - description: The user pool ID.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/ListProvidersLimitType'
          - description: The maximum number of IdPs to return.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/PaginationKeyType'
          - description: A pagination token.
    ProviderNameType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}]+'
      minLength: 1
      maxLength: 32
    DateType:
      type: string
      format: date-time
    InvalidParameterException: {}
    PaginationKeyType:
      type: string
      pattern: '[\S]+'
      minLength: 1
    TooManyRequestsException: {}
    InternalErrorException: {}
    NotAuthorizedException: {}
    ListIdentityProvidersResponse:
      type: object
      required:
      - Providers
      properties:
        Providers:
          allOf:
          - $ref: '#/components/schemas/ProvidersListType'
          - description: A list of IdP objects.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/PaginationKeyType'
          - description: A pagination token.
    ProviderDescription:
      type: object
      properties:
        ProviderName:
          allOf:
          - $ref: '#/components/schemas/ProviderNameType'
          - description: The IdP name.
        ProviderType:
          allOf:
          - $ref: '#/components/schemas/IdentityProviderTypeType'
          - description: The IdP type.
        LastModifiedDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date the provider was last modified.
        CreationDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date the provider was added to the user pool.
      description: A container for IdP details.
    ProvidersListType:
      type: array
      items:
        $ref: '#/components/schemas/ProviderDescription'
      minItems: 0
      maxItems: 50
    UserPoolIdType:
      type: string
      pattern: '[\w-]+_[0-9a-zA-Z]+'
      minLength: 1
      maxLength: 55
    ListProvidersLimitType:
      type: integer
      minimum: 0
      maximum: 60
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
