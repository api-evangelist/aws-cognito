      maxLength: 2048
      format: password
    CodeDeliveryDetailsType:
      type: object
      properties:
        Destination:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The email address or phone number destination where Amazon Cognito sent the code.
        DeliveryMedium:
          allOf:
          - $ref: '#/components/schemas/DeliveryMediumType'
          - description: The method that Amazon Cognito used to send the code.
        AttributeName:
          allOf:
          - $ref: '#/components/schemas/AttributeNameType'
          - description: The name of the attribute that Amazon Cognito verifies with the code.
      description: The delivery details for an email or SMS message that Amazon Cognito sent for authentication or verification.
