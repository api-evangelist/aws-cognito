paths:
  /#X-Amz-Target=AWSCognitoIdentityProviderService.AdminGetUser:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: AdminGetUser
      description: <p>Gets the specified user by user name in a user pool as an administrator. Works on any user.</p> <p>Calling this action requires developer credentials.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminGetUserResponse'
              examples:
                AdminGetUser200Example:
                  summary: Default AdminGetUser 200 response
                  x-microcks-default: true
                  value:
                    Username: my-user-pool
                    UserAttributes: example-value
                    UserCreateDate: example-value
                    UserLastModifiedDate: example-value
                    Enabled: example-value
                    UserStatus: CONFIRMED
                    MFAOptions: example-value
                    PreferredMfaSetting: example-value
                    UserMFASettingList: example-value
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
              examples:
                AdminGetUser480Example:
                  summary: Default AdminGetUser 480 response
                  x-microcks-default: true
                  value: example
        '481':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
              examples:
                AdminGetUser481Example:
                  summary: Default AdminGetUser 481 response
                  x-microcks-default: true
                  value: example
        '482':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
              examples:
                AdminGetUser482Example:
                  summary: Default AdminGetUser 482 response
                  x-microcks-default: true
                  value: example
        '483':
          description: NotAuthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotAuthorizedException'
              examples:
                AdminGetUser483Example:
                  summary: Default AdminGetUser 483 response
                  x-microcks-default: true
                  value: example
        '484':
          description: UserNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotFoundException'
              examples:
                AdminGetUser484Example:
                  summary: Default AdminGetUser 484 response
                  x-microcks-default: true
                  value: example
        '485':
          description: InternalErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalErrorException'
              examples:
                AdminGetUser485Example:
                  summary: Default AdminGetUser 485 response
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGetUserRequest'
            examples:
              AdminGetUserRequestExample:
                summary: Default AdminGetUser request
                x-microcks-default: true
                value:
                  UserPoolId: us-east-1_AbCdEfGhI
                  Username: my-user-pool
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - AWSCognitoIdentityProviderService.AdminGetUser
      summary: Amazon Cognito Admin Get User
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=AWSCognitoIdentityProviderService.AdminGetUser'
components:
  schemas:
    ResourceNotFoundException: {}
    AttributeType:
      type: object
      required:
      - Name
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/AttributeNameType'
          - description: The name of the attribute.
        Value:
          allOf:
          - $ref: '#/components/schemas/AttributeValueType'
          - description: The value of the attribute.
      description: Specifies whether the attribute is standard or custom.
    AttributeNameType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}]+'
      minLength: 1
      maxLength: 32
    UserNotFoundException: {}
    AdminGetUserRequest:
      type: object
      required:
      - UserPoolId
      - Username
      title: AdminGetUserRequest
      properties:
        UserPoolId:
          allOf:
          - $ref: '#/components/schemas/UserPoolIdType'
          - description: The user pool ID for the user pool where you want to get information about the user.
        Username:
          allOf:
          - $ref: '#/components/schemas/UsernameType'
          - description: The user name of the user you want to retrieve.
      description: Represents the request to get the specified user as an administrator.
    DeliveryMediumType:
      type: string
      enum:
      - SMS
      - EMAIL
    AttributeListType:
      type: array
      items:
        $ref: '#/components/schemas/AttributeType'
    DateType:
      type: string
      format: date-time
    InvalidParameterException: {}
    TooManyRequestsException: {}
    InternalErrorException: {}
    MFAOptionListType:
      type: array
      items:
        $ref: '#/components/schemas/MFAOptionType'
    StringType:
      type: string
    NotAuthorizedException: {}
    UserStatusType:
      type: string
      enum:
      - UNCONFIRMED
      - CONFIRMED
      - ARCHIVED
      - COMPROMISED
      - UNKNOWN
      - RESET_REQUIRED
      - FORCE_CHANGE_PASSWORD
    UserPoolIdType:
      type: string
      pattern: '[\w-]+_[0-9a-zA-Z]+'
      minLength: 1
      maxLength: 55
    BooleanType:
      type: boolean
    UserMFASettingListType:
      type: array
      items:
        $ref: '#/components/schemas/StringType'
    UsernameType:
      type: string
      pattern: '[\p{L}\p{M}\p{S}\p{N}\p{P}]+'
      minLength: 1
      maxLength: 128
      format: password
    AdminGetUserResponse:
      type: object
      required:
      - Username
      properties:
        Username:
          allOf:
          - $ref: '#/components/schemas/UsernameType'
          - description: The user name of the user about whom you're receiving information.
        UserAttributes:
          allOf:
          - $ref: '#/components/schemas/AttributeListType'
          - description: An array of name-value pairs representing user attributes.
        UserCreateDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date the user was created.
        UserLastModifiedDate:
          allOf:
          - $ref: '#/components/schemas/DateType'
          - description: The date the user was last modified.
        Enabled:
          allOf:
          - $ref: '#/components/schemas/BooleanType'
          - description: Indicates that the status is <code>enabled</code>.
        UserStatus:
          allOf:
          - $ref: '#/components/schemas/UserStatusType'
          - description: <p>The user status. Can be one of the following:</p> <ul> <li> <p>UNCONFIRMED - User has been created but not confirmed.</p> </li> <li> <p>CONFIRMED - User has been confirmed.</p> </li> <li> <p>ARCHIVED - User is no longer active.</p> </li> <li> <p>UNKNOWN - User status isn't known.</p> </li> <li> <p>RESET_REQUIRED - User is confirmed, but the user must request a code and reset their password before they can sign in.</p> </li> <li> <p>FORCE_CHANGE_PASSWORD - The user is confirmed and the user can sign in using a temporary password, but on first sign-in, the user must change their password to a new value before doing anything else. </p> </li> </ul>
        MFAOptions:
          allOf:
          - $ref: '#/components/schemas/MFAOptionListType'
          - description: ' <i>This response parameter is no longer supported.</i> It provides information only about SMS MFA configurations. It doesn''t provide information about time-based one-time password (TOTP) software token MFA configurations. To look up information about either type of MFA configuration, use UserMFASettingList instead.'
        PreferredMfaSetting:
          allOf:
          - $ref: '#/components/schemas/StringType'
          - description: The user's preferred MFA setting.
        UserMFASettingList:
          allOf:
          - $ref: '#/components/schemas/UserMFASettingListType'
          - description: The MFA options that are activated for the user. The possible values in this list are <code>SMS_MFA</code> and <code>SOFTWARE_TOKEN_MFA</code>.
      description: Represents the response from the server from the request to get the specified user as an administrator.
    AttributeValueType:
      type: string
      maxLength: 2048
      format: password
    MFAOptionType:
      type: object
      properties:
        DeliveryMedium:
          allOf:
          - $ref: '#/components/schemas/DeliveryMediumType'
          - description: The delivery medium to send the MFA code. You can use this parameter to set only the <code>SMS</code> delivery medium value.
        AttributeName:
          allOf:
          - $ref: '#/components/schemas/AttributeNameType'
          - description: The attribute name of the MFA option type. The only valid value is <code>phone_number</code>.
      description: ' <i>This data type is no longer supported.</i> Applies only to SMS multi-factor authentication (MFA) configurations. Does not apply to time-based one-time password (TOTP) software token MFA configurations.'
